<!doctype html>
<html><head>
<meta charset="utf-8">
<title>P+P Inventory Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI",Arial,sans-serif; font-size:13px; background:#f0f2f5; color:#222; }

  /* ── Loading screen ── */
  #loadingScreen {
    position:fixed; inset:0; background:rgba(15,15,30,0.95); z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; transition:opacity 0.4s ease;
  }
  #loadingScreen.hidden { opacity:0; pointer-events:none; }
  #loadIcon  { font-size:52px; margin-bottom:16px; }
  #loadTitle { font-size:22px; font-weight:700; margin-bottom:4px; }
  #loadSub   { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:36px; }
  #loadBarWrap { width:340px; height:4px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden; margin-bottom:20px; }
  #loadBar   { height:100%; background:#f9a825; width:0%; transition:width 0.6s ease; border-radius:3px; }
  #loadStatus { font-size:13px; color:rgba(255,255,255,0.8); margin-bottom:28px; min-height:18px; }
  #loadSteps { font-size:12px; color:rgba(255,255,255,0.4); line-height:2; min-width:240px; }
  #loadSteps .done  { color:rgba(255,255,255,0.8); }
  #loadSteps .done::before { content:"\2713\00a0"; }
  #loadSteps .active { color:#f9a825; font-weight:600; }
  #loadSteps .active::before { content:"\25b6\00a0"; }
  #loadSteps .pending::before { content:"\25cb\00a0"; }

  /* ── Top bar ── */
  .topbar { background:#1565c0; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .topbar h1 { font-size:16px; font-weight:600; }
  .stats { display:flex; gap:8px; font-size:12px; align-items:center; flex-wrap:wrap; }
  .stats .stat { background:rgba(255,255,255,0.12); padding:4px 10px; border-radius:4px; }
  .stats .stat b { font-size:14px; }
  .pri-btn {
    font-size:12px; padding:5px 12px; border-radius:18px; cursor:pointer;
    font-family:inherit; font-weight:600;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .pri-btn:hover { transform: translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,0.3); }
  .pri-btn.active { box-shadow:0 0 0 2px rgba(255,255,255,0.4); }
  .pri-btn b { font-weight:700; }

  /* ── Toolbar ── */
  .toolbar { padding:8px 18px; background:#fff; border-bottom:1px solid #d8dce3; display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
  .toolbar input { font-size:11px; padding:3px 6px; border:1px solid #ccc; border-radius:4px; font-family:inherit; }
  .toolbar input[type=text] { width:220px; }
  .ms-wrap { display:inline-flex; flex-direction:column; gap:2px; }
  .ms-label { font-size:9px; color:#6a6a6a; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; line-height:1; padding:0 2px; }

  /* ── Multi-select dropdown ── */
  .ms-dd { position:relative; display:inline-block; }
  .ms-dd-btn { font-size:11px; padding:3px 22px 3px 8px; border:1px solid #ccc; border-radius:4px; background:#fff; cursor:pointer; white-space:nowrap; text-align:left; min-width:120px; font-family:inherit; position:relative; color:#333; }
  .ms-dd-btn::after { content:'\25be'; position:absolute; right:6px; top:50%; transform:translateY(-50%); font-size:10px; color:#888; pointer-events:none; }
  .ms-dd-btn.has-sel { border-color:#1565c0; color:#1565c0; background:#e8f0fe; font-weight:600; }
  .ms-dd-panel { display:none; position:absolute; top:calc(100% + 3px); left:0; z-index:500; background:#fff; border:1px solid #c0c8d4; border-radius:5px; padding:4px 0; min-width:170px; box-shadow:0 4px 14px rgba(0,0,0,0.14); max-height:240px; overflow-y:auto; }
  .ms-dd-panel.open { display:block; }
  .ms-item { display:flex; align-items:center; gap:7px; padding:4px 10px; font-size:11px; cursor:pointer; white-space:nowrap; color:#333; user-select:none; }
  .ms-item:hover { background:#f0f4ff; }
  .ms-item input[type=checkbox] { cursor:pointer; accent-color:#1565c0; flex-shrink:0; }

  /* ── Aged inventory cards ── */
  .age-cards { display:flex; flex-wrap:wrap; gap:10px; }
  .age-card { flex:1; min-width:130px; padding:12px 14px; border-radius:6px; border:1px solid rgba(0,0,0,0.07); }
  .age-card-lbl { font-size:12px; color:#666; margin-bottom:4px; font-weight:600; }
  .age-card-val { font-size:22px; font-weight:700; line-height:1.1; }
  .age-card-pct { font-size:12px; color:#888; margin-top:3px; }

  /* ── Main table ── */
  table.main { background:#fff; border-collapse:separate; border-spacing:0; table-layout:fixed; }
  table.main th { background:#f8f9fa; padding:3px 4px; text-align:left; font-size:10px; color:#000; font-weight:600; overflow:hidden; }
  .col-label { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; line-height:1.25; }
  table.main thead tr.sort-row th { vertical-align:bottom; }
  table.main thead tr.filter-row th input { white-space:nowrap; }
  table.main td { padding:3px 4px; border-bottom:1px solid #eee; vertical-align:top; font-size:11px; overflow:hidden; color:#111; }
  table.main tr.row { cursor:pointer; }
  table.main tr.row:hover { background:#eef4ff; }
  table.main th.right, table.main td.right { text-align:right; }
  /* 2-line clamp for text-heavy cells (applied on inner div) */
  .cell-clamp2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; line-height:1.4; }
  .neg { color:#c62828; }

  /* Priority text — vivid, easy to scan */
  .pri-CRITICAL { color:#cc0000; font-weight:700; }
  .pri-HIGH     { color:#e53c00; font-weight:600; }
  .pri-MEDIUM   { color:#e07800; }
  .pri-LOW      { color:#444; }
  .pri-NO_OOS   { color:#999; }

  /* Badges — vivid */
  .badge { display:inline-block; font-size:10px; font-weight:600; padding:1px 7px; border-radius:8px; white-space:nowrap; }
  .badge-red    { background:#ffcdd2; color:#b71c1c; }
  .badge-amber  { background:#ffe0b2; color:#bf360c; }
  .badge-purple { background:#e8eaf6; color:#4527a0; }
  .badge-green  { background:#c8e6c9; color:#1b5e20; }
  .badge-gray   { background:#e0e0e0; color:#444; }

  /* ── Detail pane ── */
  .detail-pane { background:#fafafa; }
  .detail-pane td { padding:0; border-bottom:none; }
  .detail-pane .dwrap { padding:14px 18px; }
  .section { background:#fff; border:1px solid #e0e0e0; border-radius:5px; padding:10px 14px; margin-bottom:10px; }
  .section h3 { font-size:13px; font-weight:600; color:#1565c0; margin-bottom:8px; }
  table.subtbl { width:100%; border-collapse:collapse; font-size:11px; }
  table.subtbl th { background:#f5f5f5; padding:3px 6px; text-align:left; border-bottom:1px solid #ddd; font-weight:600; }
  table.subtbl td { padding:3px 6px; border-bottom:1px solid #f3f3f3; }
  table.subtbl td.right { text-align:right; }

  /* Rec cards */
  .rec-box { padding:10px 14px; border-left:3px solid #1565c0; background:#e8f0fe; margin-bottom:8px; font-size:12px; border-radius:0 4px 4px 0; }
  .rec-box.priority-HIGH { border-color:#e65100; background:#fff8e1; }
  .rec-box.priority-CRITICAL { border-color:#b71c1c; background:#ffebee; }
  .rec-box.action-NO_LEVER { border-color:#888; background:#f5f5f5; color:#666; }
  .rec-action { font-weight:700; font-size:11px; letter-spacing:0.5px; padding:2px 8px; border-radius:3px; background:rgba(255,255,255,0.6); }
  .rec-action.NO_LEVER       { color:#888; background:#eeeeee; }
  .rec-action.PULL_UP        { color:#fff; background:#1565c0; }
  .rec-action.FASTER_VESSEL  { color:#fff; background:#5e35b1; }
  .rec-action.PUSH_OUT       { color:#fff; background:#e65100; }
  .rec-action.SPLIT          { color:#fff; background:#bf360c; }
  .rec-action.CANCEL         { color:#fff; background:#b71c1c; }
  .rec-body { margin-top:6px; padding-left:4px; }
  .rec-row { padding:2px 0; font-size:11px; color:#333; }
  .rec-row .rec-lbl { display:inline-block; min-width:80px; color:#666; font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:0.3px; }
  .rec-reason { margin-top:5px; padding:4px 8px; background:rgba(255,255,255,0.5); border-radius:3px; font-size:11px; color:#444; }

  /* Inventory Flow grid */
  .grid26 { font-size:10px; }
  .grid26 th, .grid26 td { padding:2px 5px; text-align:right; white-space:nowrap; }
  .grid26 th { font-size:9px; }
  .grid26 .lbl { text-align:left; font-weight:600; }
  .grid26 .gap { background:#ffebee; color:#b71c1c; font-weight:600; }
  .grid26 .ok { color:#555; }
  .grid26 .neg { color:#b71c1c; }
  .stat-text { font-size:11px; color:#555; }
  .stat-text b { color:#222; }
  .kv-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:6px 18px; font-size:11px; }
  .kv-grid div { padding:2px 0; }
  .grid26 td[title] { position:relative; }

  /* KPI strip */
  .kpi-strip { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; padding:8px; background:#fafbfc; border:1px solid #e0e3e8; border-radius:5px; }
  .kpi { flex:0 0 auto; min-width:100px; padding:5px 10px; background:#fff; border:1px solid #e8ecf0; border-radius:4px; cursor:help; }
  .kpi-lbl { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:0.3px; }
  .kpi-val { font-size:14px; font-weight:700; color:#1565c0; margin-top:1px; }

  /* ── Sticky header rows — sticky on TH (not TR, which doesn't work cross-browser) ── */
  table.main thead tr.filter-row th { position:sticky; top:0; z-index:4; background:#fafbfc; padding:2px 3px; font-weight:400; cursor:default; box-shadow:inset 0 -1px 0 #e0e0e0; }
  table.main thead tr.filter-row input { width:100%; box-sizing:border-box; font-size:9px; padding:1px 3px; border:1px solid #ccc; border-radius:3px; font-family:inherit; background:#fff; color:#333; }
  table.main thead tr.filter-row input::placeholder { color:#aaa; font-style:italic; }
  table.main thead tr.filter-row input:focus { outline:none; border-color:#1565c0; box-shadow:0 0 0 2px rgba(21,101,192,0.15); }
  /* sort-row top is set dynamically by JS after filter-row height is measured */
  table.main thead tr.sort-row th { position:sticky; z-index:3; cursor:pointer; user-select:none; background:#f8f9fa; box-shadow:inset 0 -2px 0 #ddd; vertical-align:bottom; }
  table.main thead tr.sort-row th:hover { background:#eef4ff; }
  .sort-arrow { display:inline-block; margin-left:3px; color:#1565c0; font-size:10px; }

  /* ── Priority row coloring ── */
  table.main tr.row-CRITICAL { background:#fff5f5; }
  table.main tr.row-CRITICAL td:first-child { box-shadow:inset 3px 0 0 #cc0000; }
  table.main tr.row-HIGH { background:#fff8f3; }
  table.main tr.row-HIGH td:first-child { box-shadow:inset 3px 0 0 #e53c00; }
  table.main tr.row-MEDIUM { background:#fffef0; }
  table.main tr.row-MEDIUM td:first-child { box-shadow:inset 3px 0 0 #e07800; }
  table.main tr.row-NO_OOS { opacity:0.55; }
  table.main tr.row-CRITICAL:hover { background:#ffe9e9; }
  table.main tr.row-HIGH:hover { background:#fff0e6; }
  table.main tr.row-MEDIUM:hover { background:#fffde5; }

  /* ── Recommended Actions — 25% wide cards ── */
  .recs-wrap { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start; }
  .recs-wrap .rec-box { width:calc(25% - 6px); min-width:220px; margin-bottom:0; }
</style>
</head><body>

<div id="loadingScreen">
  <div id="loadIcon">&#127981;</div>
  <div id="loadTitle">P+P Inventory Manager</div>
  <div id="loadSub">Pets + People</div>
  <div id="loadBarWrap"><div id="loadBar"></div></div>
  <div id="loadStatus">Initializing&#8230;</div>
  <div id="loadSteps">
    <div id="ls1" class="pending">Check cache</div>
    <div id="ls2" class="pending">Load Inventory Flow</div>
    <div id="ls3" class="pending">Load Projections</div>
    <div id="ls4" class="pending">Build view</div>
  </div>
</div>

<div class="topbar">
  <!-- P+P Logo badge -->
  <div style="height:34px;padding:0 10px;background:rgba(255,255,255,0.95);border-radius:5px;display:flex;align-items:center;font-weight:800;font-size:14px;color:#1565c0;letter-spacing:-0.5px;white-space:nowrap;flex-shrink:0;">P+P</div>
  <h1>&#127981; Inventory Manager</h1>
  <div class="stats" id="statsBar"></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:16px;flex-shrink:0;">
    <div id="dataAsOf" style="font-size:11px;color:rgba(255,255,255,0.7);white-space:nowrap;text-align:right;"></div>
    <button onclick="generateRecoSheet()" style="padding:6px 14px;background:#fff;color:#1565c0;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;">
      &#128203; Generate Reco Spreadsheet
      <span id="recoBadge" style="background:#e65100;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;display:none;">0</span>
    </button>
  </div>
</div>

<div class="toolbar">
  <div class="ms-wrap"><span class="ms-label">Search</span><input type="text" id="searchInput" placeholder="mstyle / description / brand"></div>

  <div class="ms-wrap"><span class="ms-label">Action</span>
    <div class="ms-dd" id="dd-action">
      <button class="ms-dd-btn" onclick="toggleDd(event,'dd-action')">All Actions</button>
      <div class="ms-dd-panel"></div>
    </div>
  </div>

  <div class="ms-wrap"><span class="ms-label">OOS Priority</span>
    <div class="ms-dd" id="dd-priority">
      <button class="ms-dd-btn" onclick="toggleDd(event,'dd-priority')">All OOS Pri</button>
      <div class="ms-dd-panel"></div>
    </div>
  </div>

  <div class="ms-wrap"><span class="ms-label">Country</span>
    <div class="ms-dd" id="dd-country">
      <button class="ms-dd-btn" onclick="toggleDd(event,'dd-country')">All Countries</button>
      <div class="ms-dd-panel"></div>
    </div>
  </div>

  <div class="ms-wrap"><span class="ms-label">Brand</span>
    <div class="ms-dd" id="dd-brand">
      <button class="ms-dd-btn" onclick="toggleDd(event,'dd-brand')">All Brands</button>
      <div class="ms-dd-panel"></div>
    </div>
  </div>

  <div class="ms-wrap"><span class="ms-label">Inv Mgr</span>
    <div class="ms-dd" id="dd-mgr">
      <button class="ms-dd-btn" onclick="toggleDd(event,'dd-mgr')">All Inv Mgrs</button>
      <div class="ms-dd-panel"></div>
    </div>
  </div>

  <label style="font-size:11px;"><input type="checkbox" id="hideInactive" checked> Hide Inactive</label>
  <label style="font-size:11px;"><input type="checkbox" id="replenOnly" checked> Replen only</label>
  <label style="font-size:11px;"><input type="checkbox" id="gapsOnly"> OOS Risk</label>
  <label style="font-size:11px;"><input type="checkbox" id="overstockOnly"> Overstock</label>
  <button id="clearBtn" style="padding:4px 10px;background:#fff;border:1px solid #999;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;">Clear filters</button>
  <button onclick="forceRefresh()" title="Clear cache and reload all data from Quickbase" style="padding:4px 10px;background:#fff;border:1px solid #1565c0;border-radius:4px;cursor:pointer;font-size:11px;color:#1565c0;font-family:inherit;">&#128260; Refresh from QB</button>
</div>

<div style="overflow:auto;max-height:calc(100vh - 120px);">
<table class="main" id="mainTable">
  <thead id="theadMain"></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<!-- Script MUST be at end of body so DOM is fully parsed before JS runs -->
<script src="/db/bpd24h9wy?a=dbpage&pageID=56&v=20260521"></script>
</body></html>
