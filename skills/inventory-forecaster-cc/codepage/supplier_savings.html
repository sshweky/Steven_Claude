<!-- &#9472;&#9472; Loading overlay &#9472;&#9472; -->

<!-- &#9472;&#9472; App shell (populated after data loads) &#9472;&#9472; -->

<div id="app" style="display:none">

  <nav class="top-nav" id="top-nav"></nav>

  <div id="tab1" class="tab-content active"></div>

<script>

// &#9472;&#9472; QB Config &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

// Table IDs only — no tokens, no credentials.

// This page is hosted on pim.quickbase.com, so requests to /db/{table}?act=API_DoQuery

// are same-origin: the browser sends the QB session cookie automatically.

const STYLES    = 'bn458n7jz';

const FLOW      = 'bpsaju5pm';

const TERMS_TBL = 'bphzqfkev';

const SUPPLIERS = 'bn7g5ebz5';

const BUY_FIELDS = [457,459,460,461,546,547,548,549,550,551,552,553,554,555,

                    556,557,558,559,560,561,562,563,564,565,566,567];



// &#9472;&#9472; QB fetch helper (legacy XML API — same-origin, session cookie auth) &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

// Uses QB's XML API: /db/{table}?act=API_DoQuery

// No token required — the browser sends the pim.quickbase.com session cookie

// automatically because this page is served from the same domain.

async function fetchAll(table, fields, where) {

  const clist = [...new Set(fields)].join('.');

  let all = [], skip = 0;

  const parser = new DOMParser();



  while (true) {

    const params = new URLSearchParams({

      act: 'API_DoQuery',

      clist,

      fmt: 'structured',

      includeRids: '1',

      options: `num-500.skp-${skip}`

    });

    if (where) params.set('query', where);



    const resp = await fetch(`https://pim.quickbase.com/db/${table}?${params}`);

    if (!resp.ok) throw new Error(`QB API HTTP ${resp.status} for table ${table}`);



    const xml = parser.parseFromString(await resp.text(), 'text/xml');



    // Check QB-level error (errcode 0 = success)

    const errcode = xml.querySelector('errcode')?.textContent?.trim();

    if (errcode && errcode !== '0') {

      const errtxt = xml.querySelector('errtext')?.textContent || 'Unknown QB error';

      throw new Error(`QB error ${errcode}: ${errtxt}`);

    }



    const records = Array.from(xml.querySelectorAll('record'));

    if (!records.length) break;



    // Convert XML records &#8594; { fieldId: { value: string } }

    // This matches the shape expected by v() and fv() helpers below.

    const data = records.map(rec => {

      const obj = {};

      rec.querySelectorAll('f').forEach(f => {

        obj[f.getAttribute('id')] = { value: f.textContent };

      });

      return obj;

    });



    all = all.concat(data);

    if (data.length < 500) break;

    skip += data.length;

  }



  return all;

}



// &#9472;&#9472; Data helpers &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

const v    = (r, id) => r[id]?.value ?? null;

const fv   = (r, id) => { const x = parseFloat(r[id]?.value); return isNaN(x) ? null : x; };

const r2   = n => n != null ? Math.round(n * 100) / 100 : null;

const safe = (x, d = '') => x != null ? x : d;

const resolveFreight = (primary, la, override, fallback = null) => {

  const val = primary ?? la ?? override ?? fallback;

  return { value: r2(val), estimated: val === fallback && fallback != null };

};

const calcMgn = (sell, lc, roy, terms) => {

  if (!sell || !lc || sell === 0) return null;

  return (sell - lc) / sell - (roy || 0) - (terms || 0);

};



// &#9472;&#9472; Format helpers &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

const fmtUSD = n => (n == null) ? '—' : '$' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

const fmtPct = (n, dec=1) => (n == null) ? '—' : (n * 100).toFixed(dec) + '%';

const fmtInt = n => (n == null || n === 0) ? '—' : Math.round(n).toLocaleString();

const esc    = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');



// &#9472;&#9472; Loading status helpers &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

function setStatus(msg, detail) {

  document.getElementById('loading-status').textContent = msg;

  document.getElementById('loading-detail').textContent = detail || '';

}



// &#9472;&#9472; Main data load &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

async function loadData() {

  // Reset UI to loading state

  document.getElementById('loading-overlay').style.display = 'flex';

  document.getElementById('app').style.display = 'none';

  document.getElementById('spinner').style.display = 'block';

  document.getElementById('loading-error').style.display = 'none';

  document.getElementById('retry-btn').style.display = 'none';



  try {

    // &#9472;&#9472; Styles &#9472;&#9472;

    setStatus('Fetching styles…', 'Active: Replen, international');

    const styleFields = [

      7,275,23,202,205,2109,102,35,36,46,139,206,1344,300,1550,15,104,1555,

      1330,1284,1892,1885,2303,2180,2183,1893,

      1899,1285,1901,1889,2305,2181,2184,1896,

      1900,1286,1902,1890,2306,2182,2185,1898,

    ];

    const styleRowsRaw = await fetchAll(STYLES, styleFields, "{23.EX.'Active: Replen'}AND{205.XCT.'USA'}");

    const styleRows = styleRowsRaw.filter(r => {

      const sn = (v(r, 7) || '').toUpperCase();

      return !sn.startsWith('AU') && !sn.includes('WFS') && !sn.includes('DS');

    });

    setStatus('Fetching forecast…', styleRows.length + ' styles loaded');



    // &#9472;&#9472; Forecast &#9472;&#9472;

    const fcRows = await fetchAll(FLOW, [20, 294, 133, ...BUY_FIELDS], "{294.EX.'Active: Replen'}AND{133.GT.'0'}");

    const fcMap = {};

    for (const r of fcRows) {

      const ms = v(r, 20); if (!ms) continue;

      const buy = BUY_FIELDS.reduce((s, id) => s + (parseFloat(v(r, id)) || 0), 0);

      if (!fcMap[ms] || buy > fcMap[ms]) fcMap[ms] = buy;

    }

    setStatus('Fetching terms…', fcRows.length + ' forecast records');



    // &#9472;&#9472; Terms &#9472;&#9472;

    const termsRows = await fetchAll(TERMS_TBL, [6, 379]);

    const termsMap = {};

    for (const r of termsRows) {

      const ms = v(r, 6); if (!ms) continue;

      const t = fv(r, 379);

      if (t != null) termsMap[ms] = t;

    }

    function lookupTerms(mstyle, f1555val) {

      if (termsMap[mstyle] != null) return termsMap[mstyle];

      const base = mstyle ? mstyle.replace(/\/\d+$/, '') : null;

      if (base && base !== mstyle && termsMap[base] != null) return termsMap[base];

      return f1555val ?? null;

    }

    setStatus('Fetching supplier data…', termsRows.length + ' terms records');



    // &#9472;&#9472; Suppliers &#9472;&#9472;

    const suppRows = await fetchAll(SUPPLIERS, [45, 7]);

    const supCountryMap = {};

    for (const r of suppRows) {

      const name = v(r, 45)?.trim(), cty = v(r, 7);

      if (name && cty) supCountryMap[name] = cty;

    }

    for (const r of styleRows) {

      const sup = v(r, 202), cty = v(r, 205);

      if (sup && cty && !supCountryMap[sup]) supCountryMap[sup] = cty;

    }

    setStatus('Processing data…', 'Computing savings and recommendations');



    // &#9472;&#9472; Process multi-source styles &#9472;&#9472;

    const ALT_DEFS = [

      [1330,1284,1892,1885,2303,2180,2183],

      [1899,1285,1901,1889,2305,2181,2184],

      [1900,1286,1902,1890,2306,2182,2185],

    ];

    const styleData = [];

    for (const r of styleRows) {

      const styleNum=v(r,7), mstyle=v(r,275), status=v(r,23), coreSupplier=v(r,202);

      const country=v(r,205), desc=v(r,2109), brand=v(r,102), category=v(r,35), subcat=v(r,36);

      const fobCore=r2(fv(r,46)), dutyPct=fv(r,139);

      const dutyDollar=(fobCore!=null&&dutyPct!=null)?r2(fobCore*dutyPct):null;

      const coreFreightVal=fv(r,206)??fv(r,1344)??fv(r,300);

      const freightIn=r2(coreFreightVal), loadDollar=fobCore!=null?r2(fobCore*0.15):null;

      const lcCore=fobCore!=null?r2(fobCore+(dutyDollar||0)+(freightIn||0)+(loadDollar||0)):null;

      const sellPrice=r2(fv(r,1550))||r2(fv(r,15));

      const royaltyPct=fv(r,104), termsPct=lookupTerms(mstyle,fv(r,1555));

      const totalBuy=Math.round(fcMap[mstyle]||0);

      const marginCore=calcMgn(sellPrice,lcCore,royaltyPct,termsPct);



      const alts=[];

      for (const [supF,fobF,lcF,dutyRF,,frF,frLAF] of ALT_DEFS) {

        const sup=v(r,supF)?.trim(); if (!sup) continue;

        if (coreSupplier&&sup.toLowerCase()===coreSupplier.toLowerCase()) continue;

        const fob=r2(fv(r,fobF)), lcRaw=r2(fv(r,lcF)), altDutyPct=fv(r,dutyRF);

        const altDutyDollar=(fob!=null&&altDutyPct!=null)?r2(fob*altDutyPct):null;

        const {value:altFreight,estimated:freightEst}=resolveFreight(fv(r,frF),fv(r,frLAF),null,coreFreightVal);

        const altLoad=fob!=null?r2(fob*0.15):null;

        const lc=fob!=null?r2(fob+(altDutyDollar||0)+(altFreight||0)+(altLoad||0)):(lcRaw&&lcRaw>0?lcRaw:null);

        const margin=calcMgn(sellPrice,lc,royaltyPct,termsPct);

        const lcSavPerUnit=(lcCore!=null&&lc!=null)?r2(lcCore-lc):null;

        const fobDisc=(fobCore&&fob)?(fobCore-fob)/fobCore:null;

        const marginLift=(margin!=null&&marginCore!=null)?(margin-marginCore)*100:null;

        alts.push({supplier:sup,fob,lc,altDutyPct,altDutyDollar,altFreight,freightEst,altLoad,margin,lcSavPerUnit,fobDisc,marginLift});

      }

      if (!alts.length) continue;

      const savAlts=alts.filter(a=>a.lcSavPerUnit!=null&&a.lcSavPerUnit>0);

      const bestAlt=savAlts.length>0?savAlts.reduce((b,a)=>a.lcSavPerUnit>b.lcSavPerUnit?a:b):null;

      const otherAlts=alts.filter(a=>a!==bestAlt);

      const savingsTotal=bestAlt?r2(bestAlt.lcSavPerUnit*totalBuy):0;

      styleData.push({styleNum,mstyle,status,coreSupplier,country,desc,brand,category,subcat,

        fobCore,lcCore,dutyPct,dutyDollar,freightIn,loadDollar,sellPrice,royaltyPct,termsPct,

        marginCore,totalBuy,bestAlt,otherAlts,savingsTotal});

    }



    // Sort by savings

    const supMap={};

    for (const s of styleData) {

      const k=s.coreSupplier||'Unknown';

      if (!supMap[k]) supMap[k]=[];

      supMap[k].push(s);

    }

    const supList=Object.entries(supMap)

      .map(([supplier,styles])=>({supplier,styles}))

      .sort((a,b)=>b.styles.reduce((t,s)=>t+s.savingsTotal,0)-a.styles.reduce((t,s)=>t+s.savingsTotal,0));

    supList.forEach(g=>g.styles.sort((a,b)=>b.savingsTotal-a.savingsTotal||(a.styleNum||'').localeCompare(b.styleNum||'')));



    // &#9472;&#9472; Single-source reference map &#9472;&#9472;

    const refByKey={};

    const altDefsBI=[[1330,1284,1885],[1899,1285,1889],[1900,1286,1890]];

    for (const r of styleRows) {

      const coreSupp=v(r,202),coreFOB=fv(r,46),coreDuty=fv(r,139);

      const category=v(r,35),subcat=v(r,36)||'';

      if (!coreSupp||!coreFOB||!category) continue;

      for (const [supF,fobF,dutyRF] of altDefsBI) {

        const altSup=v(r,supF)?.trim(), altFOB=fv(r,fobF), altDuty=fv(r,dutyRF);

        if (!altSup||altFOB==null) continue;

        if (altSup.toLowerCase()===coreSupp.toLowerCase()) continue;

        const styleNum=v(r,7)||'';

        const addRef=(key,sup,disc,duty)=>{

          if (!refByKey[key]) refByKey[key]={};

          if (!refByKey[key][sup]) refByKey[key][sup]={fobDiscs:[],dutyPcts:[],styleNums:[],count:0,basis:'Dual-Source QB Record'};

          refByKey[key][sup].fobDiscs.push(disc);

          if (duty!=null) refByKey[key][sup].dutyPcts.push(duty);

          if (styleNum&&!refByKey[key][sup].styleNums.includes(styleNum)) refByKey[key][sup].styleNums.push(styleNum);

          refByKey[key][sup].count++;

        };

        if (altFOB<coreFOB) addRef(`${coreSupp}||${category}||${subcat}`,altSup,(coreFOB-altFOB)/coreFOB,altDuty);

        if (altFOB>coreFOB) addRef(`${altSup}||${category}||${subcat}`,coreSupp,(altFOB-coreFOB)/altFOB,coreDuty);

      }

    }

    const refMap={};

    for (const [key,alts] of Object.entries(refByKey)) {

      const candidates=Object.entries(alts)

        .map(([altSup,data])=>({

          altSupplier:altSup,

          avgFobDisc:data.fobDiscs.reduce((a,b)=>a+b,0)/data.fobDiscs.length,

          avgDutyPct:data.dutyPcts.length?data.dutyPcts.reduce((a,b)=>a+b,0)/data.dutyPcts.length:null,

          refCount:data.count, basis:data.basis, refStyleNums:data.styleNums||[]

        }))

        .filter(c=>c.avgFobDisc>0)

        .sort((a,b)=>b.avgFobDisc-a.avgFobDisc);

      if (!candidates.length) continue;

      refMap[key]={...candidates[0],candidates};

    }



    function calcProjAlt(fobCore,coreDutyPct,freightIn,lcCore,sellPrice,royaltyPct,termsPct,totalBuy,marginCore,cand) {

      if (!cand||fobCore==null) return null;

      const projFOB=r2(fobCore*(1-cand.avgFobDisc));

      const projDutyPct=cand.avgDutyPct??coreDutyPct;

      const projDutyDol=(projFOB!=null&&projDutyPct!=null)?r2(projFOB*projDutyPct):null;

      const projLoad=r2(projFOB*0.15), projFreight=freightIn;

      const projLC=r2(projFOB+(projDutyDol||0)+(projFreight||0)+(projLoad||0));

      const projLCSav=(lcCore!=null&&projLC!=null)?r2(lcCore-projLC):null;

      const projMargin=calcMgn(sellPrice,projLC,royaltyPct,termsPct);

      const projMgnLift=(projMargin!=null&&marginCore!=null)?(projMargin-marginCore)*100:null;

      const projSavTot=projLCSav!=null?r2(projLCSav*totalBuy):null;

      return {projFOB,projDutyPct,projDutyDol,projFreight,projLoad,projLC,projLCSav,projMargin,projMgnLift,projSavTot};

    }



    // &#9472;&#9472; Single-source opportunities &#9472;&#9472;

    const ssData=[];

    for (const r of styleRows) {

      const mstyle=v(r,275), coreSupp=v(r,202), category=v(r,35), subcat=v(r,36)||'';

      const ref=refMap[`${coreSupp}||${category}||${subcat}`]||(subcat?refMap[`${coreSupp}||${category}||`]:null);

      if (!ref) continue;

      const listed=[v(r,1330),v(r,1899),v(r,1900)].filter(Boolean).map(s=>s.toLowerCase().trim());

      if (listed.some(l=>l===ref.altSupplier.toLowerCase().trim())) continue;

      const fobCore=r2(fv(r,46)), dutyPct=fv(r,139);

      const dutyDollar=(fobCore!=null&&dutyPct!=null)?r2(fobCore*dutyPct):null;

      const cfv=fv(r,206)??fv(r,1344)??fv(r,300);

      const freightIn=r2(cfv), loadDollar=fobCore!=null?r2(fobCore*0.15):null;

      const lcCore=fobCore!=null?r2(fobCore+(dutyDollar||0)+(freightIn||0)+(loadDollar||0)):null;

      const sellPrice=r2(fv(r,1550))||r2(fv(r,15));

      const royaltyPct=fv(r,104), termsPct=lookupTerms(mstyle,fv(r,1555));

      const marginCore=calcMgn(sellPrice,lcCore,royaltyPct,termsPct);

      const totalBuy=Math.round(fcMap[mstyle]||0);

      const p1=calcProjAlt(fobCore,dutyPct,freightIn,lcCore,sellPrice,royaltyPct,termsPct,totalBuy,marginCore,ref.candidates[0]);

      if (!p1||!p1.projLCSav||p1.projLCSav<=0) continue;

      const cand2=ref.candidates[1]||null;

      const cand2Listed=cand2&&listed.some(l=>l===cand2.altSupplier.toLowerCase().trim());

      const p2=(!cand2||cand2Listed)?null:calcProjAlt(fobCore,dutyPct,freightIn,lcCore,sellPrice,royaltyPct,termsPct,totalBuy,marginCore,cand2);

      const has2=p2&&p2.projLCSav!=null&&p2.projLCSav>0;

      const cand3=ref.candidates[2]||null;

      const cand3Listed=cand3&&listed.some(l=>l===cand3.altSupplier.toLowerCase().trim());

      const p3=(!cand3||cand3Listed)?null:calcProjAlt(fobCore,dutyPct,freightIn,lcCore,sellPrice,royaltyPct,termsPct,totalBuy,marginCore,cand3);

      const has3=p3&&p3.projLCSav!=null&&p3.projLCSav>0;

      ssData.push({

        styleNum:v(r,7),mstyle,status:v(r,23),coreSupp,country:v(r,205),

        desc:v(r,2109),brand:v(r,102),category,subcat,

        fobCore,dutyPct,dutyDollar,freightIn,loadDollar,lcCore,

        sellPrice,royaltyPct,termsPct,marginCore,totalBuy,

        refAltSup:ref.candidates[0].altSupplier,

        altCountry:supCountryMap[ref.candidates[0].altSupplier?.trim()]||null,

        refCount:ref.candidates[0].refCount,avgFobDisc:ref.candidates[0].avgFobDisc,

        refStyleNums:ref.candidates[0].refStyleNums||[],basis:ref.candidates[0].basis,

        ...p1,

        ref2AltSup:has2?cand2.altSupplier:null,

        alt2Country:has2?(supCountryMap[cand2.altSupplier?.trim()]||null):null,

        ref2Count:has2?cand2.refCount:null, avg2FobDisc:has2?cand2.avgFobDisc:null,

        ref2StyleNums:has2?(cand2.refStyleNums||[]):[],basis2:has2?cand2.basis:null,

        ...(has2?{proj2FOB:p2.projFOB,proj2DutyPct:p2.projDutyPct,proj2DutyDol:p2.projDutyDol,

                  proj2Freight:p2.projFreight,proj2Load:p2.projLoad,proj2LC:p2.projLC,

                  proj2LCSav:p2.projLCSav,proj2Margin:p2.projMargin,proj2MgnLift:p2.projMgnLift,proj2SavTot:p2.projSavTot}

               :{proj2FOB:null,proj2DutyPct:null,proj2DutyDol:null,proj2Freight:null,proj2Load:null,

                 proj2LC:null,proj2LCSav:null,proj2Margin:null,proj2MgnLift:null,proj2SavTot:null}),

        ref3AltSup:has3?cand3.altSupplier:null,

        alt3Country:has3?(supCountryMap[cand3.altSupplier?.trim()]||null):null,

        ref3Count:has3?cand3.refCount:null, avg3FobDisc:has3?cand3.avgFobDisc:null,

        ref3StyleNums:has3?(cand3.refStyleNums||[]):[],basis3:has3?cand3.basis:null,

        ...(has3?{proj3FOB:p3.projFOB,proj3DutyPct:p3.projDutyPct,proj3DutyDol:p3.projDutyDol,

                  proj3Freight:p3.projFreight,proj3Load:p3.projLoad,proj3LC:p3.projLC,

                  proj3LCSav:p3.projLCSav,proj3Margin:p3.projMargin,proj3MgnLift:p3.projMgnLift,proj3SavTot:p3.projSavTot}

               :{proj3FOB:null,proj3DutyPct:null,proj3DutyDol:null,proj3Freight:null,proj3Load:null,

                 proj3LC:null,proj3LCSav:null,proj3Margin:null,proj3MgnLift:null,proj3SavTot:null})

      });

    }



    const ssSupMap={};

    for (const s of ssData) {

      if (!ssSupMap[s.coreSupp]) ssSupMap[s.coreSupp]=[];

      ssSupMap[s.coreSupp].push(s);

    }

    const ssSupList=Object.entries(ssSupMap)

      .map(([sup,styles])=>({sup,styles}))

      .sort((a,b)=>b.styles.reduce((t,s)=>t+(s.projSavTot||0),0)-a.styles.reduce((t,s)=>t+(s.projSavTot||0),0));

    ssSupList.forEach(g=>g.styles.sort((a,b)=>(b.projSavTot||0)-(a.projSavTot||0)));



    const ssBySupplier={};

    for (const g of ssSupList) {

      ssBySupplier[g.sup]={count:g.styles.length,savTot:g.styles.reduce((t,s)=>t+(s.projSavTot||0),0)};

    }



    // &#9472;&#9472; Render &#9472;&#9472;

    setStatus('Rendering dashboard…', ssData.length + ' SS opportunities found');

    renderApp(supList, ssSupList, ssBySupplier, styleData, ssData);



  } catch(e) {

    document.getElementById('spinner').style.display = 'none';

    document.getElementById('loading-status').textContent = 'Failed to load data';

    const errEl = document.getElementById('loading-error');

    errEl.textContent = e.message;

    errEl.style.display = 'block';

    document.getElementById('retry-btn').style.display = 'inline-block';

  }

}



// &#9472;&#9472; Render functions &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

function renderApp(supList, ssSupList, ssBySupplier, styleData, ssData) {

  window._exportData = { supList, ssSupList, ssBySupplier, styleData, ssData };

  const generatedAt = new Date().toLocaleString('en-US', {dateStyle:'long', timeStyle:'short'});



  // KPIs

  const dsSave100   = styleData.reduce((t,s)=>t+(s.savingsTotal||0),0);

  const dsSavStyles = styleData.filter(s=>s.bestAlt&&s.savingsTotal>0).length;

  const ssSave100   = ssData.reduce((t,s)=>t+(s.projSavTot||0),0);

  const ssOppStyles = ssData.length;



  // Nav

  document.getElementById('top-nav').innerHTML = `

    <div class="brand">Supplier Savings Analysis<small>Updated ${generatedAt}</small></div>

    <button class="tab-btn active" onclick="showTab('tab1',this)">Dashboard</button>

    <button class="tab-btn" onclick="showTab('tab2',this)">Multi-Source Analysis</button>

    <button class="tab-btn" onclick="showTab('tab3',this)">Single-Source Opportunity</button>

    <button class="tab-btn" onclick="showTab('tab4',this)">Methodology</button>

    <button class="tab-btn refresh-btn" onclick="loadData()">&#128260; Refresh</button>

    <button class="tab-btn export-btn" onclick="exportExcel()">&#128229; Export Excel</button>`;



  // Tab contents

  document.getElementById('tab1').innerHTML = buildDashboard(supList,ssSupList,ssBySupplier,styleData,ssData,dsSave100,dsSavStyles,ssSave100,ssOppStyles);

  document.getElementById('tab2').innerHTML = buildMultiSource(supList);

  document.getElementById('tab3').innerHTML = buildSingleSource(ssSupList);

  document.getElementById('tab4').innerHTML = buildMethodology(generatedAt);



  // Show app

  document.getElementById('loading-overlay').style.display = 'none';

  document.getElementById('app').style.display = 'block';



  // Reset active tab to Dashboard

  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));

  document.getElementById('tab1').classList.add('active');

}



// &#9472;&#9472; TAB 1: Dashboard &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

function buildDashboard(supList,ssSupList,ssBySupplier,styleData,ssData,dsSave100,dsSavStyles,ssSave100,ssOppStyles) {

  const dsSave50=dsSave100*0.5, combSave100=dsSave100+ssSave100;

  const kpis=[

    {label:'DS Styles w/ Savings',value:dsSavStyles.toLocaleString(),color:'#1E8449',border:'#27ae60'},

    {label:'DS Save @ 100%',value:'$'+Math.round(dsSave100).toLocaleString(),color:'#1E8449',border:'#27ae60'},

    {label:'DS Save @ 50%',value:'$'+Math.round(dsSave50).toLocaleString(),color:'#2e86c1',border:'#2e86c1'},

    {label:'SS Opp. Styles',value:ssOppStyles.toLocaleString(),color:'#7d3c98',border:'#7d3c98'},

    {label:'SS Save @ 100%',value:'$'+Math.round(ssSave100).toLocaleString(),color:'#7d3c98',border:'#7d3c98'},

    {label:'Combined Save @ 100%',value:'$'+Math.round(combSave100).toLocaleString(),color:'#0F3460',border:'#0F3460'},

  ];

  const kpiCards=kpis.map(k=>`<div class="kpi-card" style="border-left-color:${k.border}"><div class="kpi-label">${esc(k.label)}</div><div class="kpi-value" style="color:${k.color}">${esc(k.value)}</div></div>`).join('');



  const allSuppliers=new Set([...supList.map(g=>g.supplier),...ssSupList.map(g=>g.sup)]);

  const sortedSuppliers=[...allSuppliers].sort((a,b)=>{

    const dsA=supList.find(g=>g.supplier===a)?.styles.reduce((t,s)=>t+(s.savingsTotal||0),0)||0;

    const dsB=supList.find(g=>g.supplier===b)?.styles.reduce((t,s)=>t+(s.savingsTotal||0),0)||0;

    return (dsB+(ssBySupplier[b]?.savTot||0))-(dsA+(ssBySupplier[a]?.savTot||0));

  });



  let gtTotalStyles=0,gtDsSav=0,gtBuy=0,gtDs25=0,gtDs50=0,gtDs100=0,gtSsStyles=0,gtSs25=0,gtSs50=0,gtSs100=0;

  const rows=sortedSuppliers.map((sup,i)=>{

    const grp=supList.find(g=>g.supplier===sup);

    const ss=ssBySupplier[sup]||{count:0,savTot:0};

    const totalStyles=grp?grp.styles.length:0;

    const dsStyles=grp?grp.styles.filter(s=>s.bestAlt&&s.savingsTotal>0).length:0;

    const buy=grp?grp.styles.reduce((t,s)=>t+s.totalBuy,0):0;

    const ds100=grp?grp.styles.reduce((t,s)=>t+(s.savingsTotal||0),0):0;

    const discs=grp?grp.styles.filter(s=>s.bestAlt?.fobDisc).map(s=>s.bestAlt.fobDisc):[];

    const avgDisc=discs.length?discs.reduce((a,b)=>a+b,0)/discs.length:null;

    const comb100=ds100+ss.savTot;

    gtTotalStyles+=totalStyles; gtDsSav+=dsStyles; gtBuy+=buy;

    gtDs25+=ds100*0.25; gtDs50+=ds100*0.5; gtDs100+=ds100;

    gtSsStyles+=ss.count; gtSs25+=ss.savTot*0.25; gtSs50+=ss.savTot*0.5; gtSs100+=ss.savTot;

    return `<tr ${i%2===1?'class="alt-row"':''}>

      <td class="num">${i+1}</td><td class="bold">${esc(sup)}</td>

      <td class="num">${totalStyles||'—'}</td>

      <td class="num ${dsStyles>0?'green':''}">${dsStyles||'—'}</td>

      <td class="num">${fmtInt(buy)}</td>

      <td class="${ds100>0?'green':''}">${ds100>0?fmtUSD(ds100*0.25):'—'}</td>

      <td class="${ds100>0?'green':''}">${ds100>0?fmtUSD(ds100*0.5):'—'}</td>

      <td class="${ds100>0?'green bold':''}">${ds100>0?fmtUSD(ds100):'—'}</td>

      <td class="num">${avgDisc!=null?fmtPct(avgDisc):'—'}</td>

      <td class="num ${ss.count>0?'purple':''}">${ss.count||'—'}</td>

      <td class="${ss.savTot>0?'purple':''}">${ss.savTot>0?fmtUSD(ss.savTot*0.25):'—'}</td>

      <td class="${ss.savTot>0?'purple':''}">${ss.savTot>0?fmtUSD(ss.savTot*0.5):'—'}</td>

      <td class="${ss.savTot>0?'purple bold':''}">${ss.savTot>0?fmtUSD(ss.savTot):'—'}</td>

      <td class="${comb100>0?'navy bold':''}">${comb100>0?fmtUSD((ds100+ss.savTot)*0.25):'—'}</td>

      <td class="${comb100>0?'navy bold':''}">${comb100>0?fmtUSD((ds100+ss.savTot)*0.5):'—'}</td>

      <td class="${comb100>0?'navy bold':''}">${comb100>0?fmtUSD(comb100):'—'}</td></tr>`;

  }).join('');

  const gt100=gtDs100+gtSs100;

  const grandRow=`<tr class="grand-total">

    <td colspan="2" class="bold">GRAND TOTAL</td>

    <td class="num bold">${gtTotalStyles}</td><td class="num bold green">${gtDsSav}</td>

    <td class="num bold">${fmtInt(gtBuy)}</td>

    <td class="green bold">${fmtUSD(gtDs25)}</td><td class="green bold">${fmtUSD(gtDs50)}</td><td class="green bold">${fmtUSD(gtDs100)}</td>

    <td>—</td><td class="num bold purple">${gtSsStyles}</td>

    <td class="purple bold">${fmtUSD(gtSs25)}</td><td class="purple bold">${fmtUSD(gtSs50)}</td><td class="purple bold">${fmtUSD(gtSs100)}</td>

    <td class="navy bold">${fmtUSD(gtDs25+gtSs25)}</td><td class="navy bold">${fmtUSD(gtDs50+gtSs50)}</td><td class="navy bold">${fmtUSD(gt100)}</td></tr>`;



  return `<div class="kpi-row">${kpiCards}</div>

  <h2 class="section-title">Supplier Summary</h2>

  <div class="tab-toolbar" style="margin-bottom:10px">

    <input type="text" class="search-box" id="dash-search" placeholder="Search suppliers…" oninput="filterDash()">

  </div>

  <div class="table-wrap"><table id="dash-table">

    <thead>

      <tr>

        <th class="group-hdr" colspan="9"  style="background:#1565C0;letter-spacing:.5px">&#128202; DUAL-SOURCE</th>

        <th class="group-hdr" colspan="4"  style="background:#2E7D32;letter-spacing:.5px">&#128269; SINGLE-SOURCE OPPORTUNITY</th>

        <th class="group-hdr" colspan="3"  style="background:#6A1B9A;letter-spacing:.5px">&#9889; COMBINED</th>

      </tr>

      <tr>

        <th style="background:#1E88E5">#</th><th style="background:#1E88E5;text-align:left">Supplier</th>

        <th style="background:#1E88E5">Total Styles</th><th style="background:#1E88E5">DS Styles w/ Savings</th>

        <th style="background:#1E88E5">6-Mo Buy Units</th><th style="background:#1E88E5">DS Save@25%</th>

        <th style="background:#1E88E5">DS Save@50%</th><th style="background:#1E88E5">DS Save@100%</th>

        <th style="background:#1E88E5">Avg FOB Disc%</th>

        <th style="background:#43A047">SS Opp Styles</th><th style="background:#43A047">SS Save@25%</th>

        <th style="background:#43A047">SS Save@50%</th><th style="background:#43A047">SS Save@100%</th>

        <th style="background:#8E24AA">Comb Save@25%</th><th style="background:#8E24AA">Comb Save@50%</th>

        <th style="background:#8E24AA">Comb Save@100%</th>

      </tr>

    </thead>

    <tbody id="dash-tbody">${rows}${grandRow}</tbody>

  </table></div>`;

}



// &#9472;&#9472; TAB 2: Multi-Source Analysis &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

function buildMultiSource(supList) {

  const CG=`<colgroup>

    <col style="width:110px"><col style="width:260px"><col style="width:130px"><col style="width:135px">

    <col style="width:185px"><col style="width:70px"><col style="width:72px"><col style="width:70px"><col style="width:82px">

    <col style="width:185px"><col style="width:70px"><col style="width:72px"><col style="width:70px"><col style="width:82px">

    <col style="width:72px"><col style="width:88px"><col style="width:82px">

// &#9472;&#9472; TAB 4: Methodology &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

function buildMethodology(generatedAt) {

  return `<div class="methodology">

    <h2>What This Dashboard Shows</h2>

    <p>This report analyzes <strong>Active: Replen</strong> styles from international suppliers (non-USA). AU, WFS, and DS prefix styles are excluded. Data is pulled <strong>live from Quickbase</strong> each time this page loads or Refresh is clicked.</p>

    <h3>Tab 1 — Dashboard</h3>

    <p>KPI cards and a supplier summary table showing dual-source (DS) savings and single-source opportunity (SS) savings side by side.</p>

    <h3>Tab 2 — Multi-Source Analysis</h3>

    <p>For each style with at least one ALT supplier in QB (fields 1330, 1899, 1900), all ALTs are evaluated and the one delivering the greatest LC save per unit is the "Best ALT". Grouped by core supplier, collapsible.</p>

    <h3>Tab 3 — Single-Source Opportunity</h3>

    <p>Uses the bidirectional dual-source methodology to identify styles with no ALT in QB but where a proven cheaper alternative exists from other dual-sourced records in the same supplier/category/subcategory. Up to 3 ranked ALT options shown.</p>

    <h2>Cost Calculation Formulas</h2>

    <div class="formula-box">

      <p>Duty $ = FOB × Duty Rate % (field 139)</p>

      <p>Load $ = FOB × 15%</p>

      <p>Landed Cost = FOB + Duty$ + Freight + Load$</p>

      <p>Margin = (Sell Price &#8722; LC) / Sell Price &#8722; Royalty% &#8722; Avg Terms%</p>

      <p>LC Save/Unit = Core LC &#8722; ALT LC</p>

      <p>Save @ X% = LC Save/Unit × 6-Mo Buy Units × X%</p>

      <p>Freight: field 206 &#8594; field 1344 (LA) &#8594; field 300 (override). If no ALT freight, core freight used as proxy.</p>

      <p>Terms %: bphzqfkev table field 379 (primary) &#8594; strip /N pack suffix fallback &#8594; field 1555 last resort.</p>

    </div>

    <h2>Bidirectional Single-Source Logic</h2>

    <p>For every dual-sourced style, FOB comparisons are recorded in both directions. If ALT FOB &lt; Core FOB, the ALT is proven cheaper for that core supplier/category. If ALT FOB &gt; Core FOB, the Core is cheaper — making it a candidate ALT for styles where that ALT is the core.</p>

    <p><em>Example:</em> FFP10159 has Core = Huiji @ $0.54, ALT = H&amp;O @ $0.58 &#8594; Huiji is cheaper &#8594; for H&amp;O single-source styles in that category, Huiji is the recommended ALT.</p>

    <h2>Data Sources</h2>

    <div class="formula-box">

      <p>Styles (bn458n7jz): style#, mstyle, supplier, country, FOB (46), duty% (139), freight (206/1344/300), sell (1550/15), royalty% (104), terms% (1555), ALT fields (1330/1899/1900 + FOB/duty/freight)</p>

      <p>Forecast (bpsaju5pm): mstyle (20), buy units W1–W26 (457, 459–461, 546–567)</p>

      <p>Terms (bphzqfkev): mstyle (6), Avg Terms% (379)</p>

      <p>Suppliers (bn7g5ebz5): name (45), country (7)</p>

    </div>

    <p class="footnote">Updated: ${generatedAt} &nbsp;|&nbsp; Source: Quickbase (pim.quickbase.com) &nbsp;|&nbsp; App: bn458t5nz</p>

  </div>`;

}

function clearFilters(prefix) {

function fmtUSDjs(n){if(n==null)return '—';return '$'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function recalcSubtotals(prefix) {

  document.querySelectorAll('tr.sup-hdr[data-prefix="'+prefix+'"]').forEach(hdr=>{

    const grpCls=hdr.getAttribute('data-grp');

    const subRow=document.querySelector('tr.subtotal-row.'+grpCls);

    if (!subRow) return;

    const visRows=Array.from(document.querySelectorAll('tr.data-row.'+grpCls)).filter(r=>!r.classList.contains('hidden-row'));

    const buy=visRows.reduce((t,r)=>t+(parseFloat(r.getAttribute('data-buy'))||0),0);

    const sav100=visRows.reduce((t,r)=>t+(parseFloat(r.getAttribute('data-sav100'))||0),0);

    const buyCell=subRow.querySelector('.sub-buy'),s25=subRow.querySelector('.sub-s25'),s50=subRow.querySelector('.sub-s50'),s100=subRow.querySelector('.sub-s100');

    if(buyCell)buyCell.textContent=buy>0?Math.round(buy).toLocaleString():'—';

    if(s25){s25.className=(sav100>0?'green bold ':'')+'sub-s25';s25.textContent=sav100>0?fmtUSDjs(sav100*0.25):'—';}

    if(s50){s50.className=(sav100>0?'green bold ':'')+'sub-s50';s50.textContent=sav100>0?fmtUSDjs(sav100*0.5):'—';}

    if(s100){s100.className=(sav100>0?'green bold ':'')+'sub-s100';s100.textContent=sav100>0?fmtUSDjs(sav100):'—';}

    if(prefix==='ss'){

      const sav2=visRows.reduce((t,r)=>t+(parseFloat(r.getAttribute('data-sav2-100'))||0),0);

      const c2=subRow.querySelector('.sub2-s100');

      if(c2){c2.className=(sav2>0?'purple bold ':'')+'sub2-s100';c2.textContent=sav2>0?fmtUSDjs(sav2):'—';}

      const sav3=visRows.reduce((t,r)=>t+(parseFloat(r.getAttribute('data-sav3-100'))||0),0);

      const c3=subRow.querySelector('.sub3-s100');

      if(c3){c3.className=(sav3>0?'teal bold ':'')+'sub3-s100';c3.textContent=sav3>0?fmtUSDjs(sav3):'—';}

    }

  });

}

function filterDash() {

  const q=(document.getElementById('dash-search')?.value||'').toLowerCase().trim();

  document.querySelectorAll('#dash-tbody tr:not(.grand-total)').forEach(row=>{

    const name=(row.querySelector('td:nth-child(2)')?.textContent||'').toLowerCase();

    row.classList.toggle('hidden-row',q.length>0&&!name.includes(q));

  });

}

function filterTab(prefix) {

  const q=(document.getElementById(prefix+'-search')?.value||'').toLowerCase().trim();

  const recVal=(document.getElementById(prefix+'-rec-filter')?.value||'');

  const margVal=(document.getElementById(prefix+'-margin-filter')?.value||'');

  const hasFilter=!!(q||recVal||margVal);

  document.querySelectorAll('tr.sup-hdr[data-prefix="'+prefix+'"]').forEach(hdr=>{

    const grpCls=hdr.getAttribute('data-grp');

    const dataRows=document.querySelectorAll('tr.data-row.'+grpCls);

    let anyVisible=false;

    dataRows.forEach(row=>{

      let show=true;

      if(q&&!(row.getAttribute('data-searchable')||'').toLowerCase().includes(q))show=false;

      if(recVal==='switch'&&row.getAttribute('data-rec')!=='switch')show=false;

      if(recVal==='next-buy'&&row.getAttribute('data-rec')!=='next-buy')show=false;

      if(recVal==='keep'&&row.getAttribute('data-rec')!=='keep')show=false;

      const m=parseFloat(row.getAttribute('data-core-margin'));

      if(margVal==='low'&&!(m<0.27))show=false;

      if(margVal==='neg'&&!(m<0))show=false;

      row.classList.toggle('hidden-row',!show);

      if(show)anyVisible=true;

    });

    const hideGrp=hasFilter&&!anyVisible;

    hdr.classList.toggle('hidden-row',hideGrp);

    document.querySelectorAll('tr.subtotal-row.'+grpCls).forEach(r=>r.classList.toggle('hidden-row',hideGrp));

    if(hasFilter&&anyVisible){

      hdr.classList.remove('grp-collapsed');

      dataRows.forEach(r=>r.classList.remove('collapsed-row'));

      document.querySelectorAll('tr.subtotal-row.'+grpCls).forEach(r=>r.classList.remove('collapsed-row'));

    }

  });

  recalcSubtotals(prefix);

}

  h3.eachCell({includeEmpty:true},(c,ci)=>{

    c.fill=fl(ci<=B3?C.blue:ci<=B3+A3?C.green:ci<=B3+A3*2?C.purple:C.teal);

  });

  ws3.getRow(4).height=30; ws3.views=[{state:'frozen',ySplit:4}];



  let r3i=1, totS1=0, totS2=0, totS3=0;

  const fa=(row,o)=>{  // apply num formats for one ALT block starting at col o+1

    [o+7,o+9,o+10,o+11,o+12,o+14,o+17,o+18,o+19].forEach(c=>row.getCell(c).numFmt=FMT.usd);

    [o+6,o+8,o+13].forEach(c=>row.getCell(c).numFmt=FMT.pct);

    row.getCell(o+16).numFmt=FMT.int;

  };

  for (const g of ssSupList) {

    const g1=g.styles.reduce((t,s)=>t+(s.projSavTot||0),0);

    const g2=g.styles.reduce((t,s)=>t+(s.proj2SavTot||0),0);

    const g3=g.styles.reduce((t,s)=>t+(s.proj3SavTot||0),0);

    totS1+=g1; totS2+=g2; totS3+=g3;

    const gr=ws3.addRow([]);

    ws3.mergeCells(gr.number,1,gr.number,L3);

    gr.getCell(1).value=`  ${g.sup}   (${g.styles.length} styles)   #1 Save@100%: $${g1.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;

    gr.getCell(1).fill=fl(C.navy); gr.getCell(1).font=fn(true,10,'FFFFFF'); gr.height=18;

    for (const s of g.styles) {

      const row=ws3.addRow([r3i++,

        s.styleNum,s.mstyle,s.status,s.desc,s.brand,s.category,s.subcat,s.coreSupp,s.country,

        usd(s.fobCore),s.dutyPct,usd(s.dutyDollar),usd(s.freightIn),usd(s.loadDollar),usd(s.lcCore),s.marginCore,usd(s.sellPrice),s.royaltyPct,s.termsPct,

        s.refAltSup,s.altCountry,s.basis,s.refCount,(s.refStyleNums||[]).join(', '),s.avgFobDisc,

        usd(s.projFOB),s.projDutyPct,usd(s.projDutyDol),usd(s.projFreight),usd(s.projLoad),usd(s.projLC),s.projMargin,usd(s.projLCSav),s.projMgnLift!=null?r2x(s.projMgnLift):null,s.totalBuy,usd((s.projSavTot||0)*.25),usd((s.projSavTot||0)*.5),usd(s.projSavTot||0),

        s.ref2AltSup||'',s.alt2Country||'',s.basis2||'',s.ref2Count||'',(s.ref2StyleNums||[]).join(', '),s.avg2FobDisc,

        usd(s.proj2FOB),s.proj2DutyPct,usd(s.proj2DutyDol),usd(s.proj2Freight),usd(s.proj2Load),usd(s.proj2LC),s.proj2Margin,usd(s.proj2LCSav),s.proj2MgnLift!=null?r2x(s.proj2MgnLift):null,s.ref2AltSup?s.totalBuy:null,s.proj2SavTot?usd(s.proj2SavTot*.25):null,s.proj2SavTot?usd(s.proj2SavTot*.5):null,s.proj2SavTot?usd(s.proj2SavTot):null,

        s.ref3AltSup||'',s.alt3Country||'',s.basis3||'',s.ref3Count||'',(s.ref3StyleNums||[]).join(', '),s.avg3FobDisc,

        usd(s.proj3FOB),s.proj3DutyPct,usd(s.proj3DutyDol),usd(s.proj3Freight),usd(s.proj3Load),usd(s.proj3LC),s.proj3Margin,usd(s.proj3LCSav),s.proj3MgnLift!=null?r2x(s.proj3MgnLift):null,s.ref3AltSup?s.totalBuy:null,s.proj3SavTot?usd(s.proj3SavTot*.25):null,s.proj3SavTot?usd(s.proj3SavTot*.5):null,s.proj3SavTot?usd(s.proj3SavTot):null]);

      for(let c=1;c<=B3;c++) row.getCell(c).fill=fl(C.blueBg);

      for(let c=B3+1;c<=B3+A3;c++) row.getCell(c).fill=fl(C.greenBg);

      if(s.ref2AltSup) for(let c=B3+A3+1;c<=B3+A3*2;c++) row.getCell(c).fill=fl(C.purpleBg);

      if(s.ref3AltSup) for(let c=B3+A3*2+1;c<=L3;c++) row.getCell(c).fill=fl(C.tealBg);

      [11,13,14,15,16,18].forEach(c=>row.getCell(c).numFmt=FMT.usd);

      [12,17,19,20].forEach(c=>row.getCell(c).numFmt=FMT.pct);

      fa(row,B3); fa(row,B3+A3); fa(row,B3+A3*2);

      if(s.marginCore!=null){ if(s.marginCore<0) row.getCell(17).font=fn(true,9,C.red); else if(s.marginCore<0.27) row.getCell(17).font=fn(false,9,C.amber); }

      if((s.projSavTot||0)>0)  row.getCell(B3+A3).font=fn(true,9,C.green);

      if((s.proj2SavTot||0)>0) row.getCell(B3+A3*2).font=fn(true,9,C.purple);

      if((s.proj3SavTot||0)>0) row.getCell(L3).font=fn(true,9,C.teal);

    }

  }

  const gt3=ws3.addRow([]); gt3.height=20;

  for(let c=1;c<=L3;c++) gt3.getCell(c).fill=fl(C.sub);

  gt3.getCell(1).value='  Grand Total'; gt3.getCell(1).font=fn(true,10);

  const sg=(c,v,col)=>{ gt3.getCell(c).value=usd(v); gt3.getCell(c).numFmt=FMT.usd; gt3.getCell(c).font=fn(true,10,col); };

  sg(B3+A3,totS1,C.green);

  if(totS2>0) sg(B3+A3*2,totS2,C.purple);

  if(totS3>0) sg(L3,totS3,C.teal);



  // &#9472;&#9472; Download &#9472;&#9472;

  const buffer=await wb.xlsx.writeBuffer();

  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

  const url=URL.createObjectURL(blob);

  const a=document.createElement('a');

  a.href=url; a.download=`Multi_Source_Analysis_${new Date().toISOString().slice(0,10)}.xlsx`; a.click();

  setTimeout(()=>URL.revokeObjectURL(url),1000);

  } catch(err) { alert('Export failed: '+err.message); console.error(err); }

  finally { btn.textContent=origText; btn.disabled=false; }

}

</script>
