<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>P+P Inventory Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, Arial, sans-serif; font-size: 13px; background: #f0f2f5; color: #222; }

/* ── Loading overlay ────────────────────────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0; background: #263238; color: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; gap: 18px;
}
#loading-overlay h2 { font-size: 22px; font-weight: 600; letter-spacing: .5px; }
#loading-status { font-size: 14px; color: #b0bec5; min-height: 20px; }
#loading-bar-wrap { width: 360px; height: 8px; background: #37474f; border-radius: 4px; overflow: hidden; }
#loading-bar { height: 100%; width: 0%; background: #4dd0e1; border-radius: 4px; transition: width .3s ease; }
#loading-steps { font-size: 12px; color: #78909c; }

/* ── Header ─────────────────────────────────────────────────────────── */
#header {
  background: #263238; color: #fff; padding: 10px 18px;
  display: flex; flex-direction: column; gap: 6px;
  position: sticky; top: 0; z-index: 100;
}
#header-top { display: flex; align-items: center; gap: 12px; }
#header h1 { font-size: 17px; font-weight: 700; flex: 1; }
#data-ts { font-size: 11px; color: #90a4ae; }

/* Stats bar */
#stats-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 2px 0;
}
.pri-btn {
  padding: 3px 11px; border-radius: 12px; font-size: 12px; font-weight: 700;
  border: none; cursor: pointer; transition: opacity .15s, outline .1s;
}
.pri-btn:hover { opacity: .8; }
.pri-btn.active { outline: 3px solid #fff; outline-offset: 2px; }
.pri-all    { background: #eceff1; color: #37474f; }
.pri-crit   { background: #b71c1c; color: #fff; }
.pri-high   { background: #e65100; color: #fff; }
.pri-med    { background: #f9a825; color: #222; }
.pri-low    { background: #5d4037; color: #fff; }
.stat-chip  { font-size: 11px; color: #cfd8dc; padding: 0 4px; }

/* ── Filter bar ─────────────────────────────────────────────────────── */
#filter-bar {
  background: #fff; border-bottom: 1px solid #ddd; padding: 7px 14px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  position: sticky; top: 80px; z-index: 99;
}
#filter-bar input[type=text] {
  font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
  width: 230px;
}
#filter-bar select {
  font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px;
  max-width: 140px;
}
.chk-wrap { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #555; cursor: pointer; }
.chk-wrap input { cursor: pointer; }
.filter-sep { width: 1px; height: 20px; background: #ddd; }

/* ── Table ──────────────────────────────────────────────────────────── */
#table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead th {
  background: #37474f; color: #fff; padding: 8px 10px;
  text-align: left; font-size: 12px; white-space: nowrap;
  cursor: pointer; user-select: none; position: sticky; top: 0;
}
thead th:hover { background: #455a64; }
thead th .sort-arrow { font-size: 10px; margin-left: 3px; opacity: .6; }
tbody tr { border-bottom: 1px solid #e8ecef; }
tbody tr:nth-child(even) { background: #f5f5f5; }
tbody tr:hover { background: #e8f4f8; }
tbody tr.gap-row { background: #ffebee; }
tbody tr.gap-row:nth-child(even) { background: #ffd7d8; }
tbody tr.gap-row:hover { background: #ffc9cb; }
tbody tr.over-row { background: #e3f2fd; }
tbody tr.over-row:nth-child(even) { background: #d4eafa; }
tbody tr.over-row:hover { background: #c2dff7; }
tbody tr.detail-open { background: #fff3e0 !important; }
td { padding: 7px 10px; font-size: 12px; vertical-align: middle; }
td.mstyle-cell { max-width: 160px; }
td.mstyle-cell .ms { font-weight: 700; font-size: 12px; color: #1a237e; }
td.mstyle-cell .desc { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

/* Priority pill */
.pill {
  display: inline-block; padding: 2px 9px; border-radius: 10px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.pill-CRITICAL { background: #b71c1c; color: #fff; }
.pill-HIGH     { background: #e65100; color: #fff; }
.pill-MEDIUM   { background: #f9a825; color: #222; }
.pill-LOW      { background: #e0e0e0; color: #555; }

/* Gap badge */
.gap-badge {
  background: #c62828; color: #fff; padding: 1px 7px; border-radius: 9px;
  font-size: 11px; font-weight: 700;
}

/* Pipeline WOS coloring */
.wos-red    { color: #b71c1c; font-weight: 700; }
.wos-orange { color: #e65100; font-weight: 700; }
.wos-blue   { color: #1565c0; font-weight: 700; }
.wos-ok     { color: #2e7d32; }

/* Action pill */
.act-PULL_UP        { background: #1565c0; color: #fff; }
.act-FASTER_VESSEL  { background: #6a1b9a; color: #fff; }
.act-PUSH_OUT       { background: #4e342e; color: #fff; }
.act-CANCEL         { background: #880e4f; color: #fff; }
.act-SPLIT          { background: #e65100; color: #fff; }
.act-NO_LEVER       { background: #757575; color: #fff; }
.act-none           { color: #999; }

/* ── Detail pane ────────────────────────────────────────────────────── */
.detail-row td { padding: 0; background: #fafafa !important; }
.detail-pane {
  padding: 14px 18px; border-top: 3px solid #4dd0e1;
  animation: slideDown .18s ease;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.dp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 12px; }
.dp-card {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
  padding: 12px 14px;
}
.dp-card h3 { font-size: 12px; font-weight: 700; color: #37474f; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.dp-kv { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; }
.dp-kv .k { font-size: 11px; color: #78909c; white-space: nowrap; }
.dp-kv .v { font-size: 11px; color: #222; font-weight: 500; word-break: break-word; }
.dp-kv .v.flag-on { color: #b71c1c; font-weight: 700; }
.dp-kv .v.flag-off { color: #bbb; }
.dp-kv2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 10px; }
.dp-kv2 .kv-pair { display: contents; }
.dp-note { font-size: 11px; color: #444; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
/* 26-week horizon table */
.hz-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.hz-table th { background: #455a64; color: #fff; padding: 4px 6px; text-align: center; white-space: nowrap; }
.hz-table td { padding: 4px 6px; text-align: center; border-bottom: 1px solid #eee; }
.hz-beg-ok   { background: #e8f5e9; }
.hz-beg-warn { background: #fff9c4; }
.hz-beg-gap  { background: #ffebee; font-weight: 700; color: #b71c1c; }
/* PO table */
.po-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.po-table th { background: #546e7a; color: #fff; padding: 4px 8px; text-align: left; }
.po-table td { padding: 4px 8px; border-bottom: 1px solid #eee; }
.po-status-MOVABLE           { color: #2e7d32; font-weight: 700; }
.po-status-LOCKED            { color: #ef6c00; font-weight: 700; }
.po-status-IN_TRANSIT        { color: #1565c0; font-weight: 700; }
.po-status-FASTER_VESSEL_WINDOW { color: #6a1b9a; font-weight: 700; }
.po-status-PULL_UP_NARROW    { color: #e65100; font-weight: 700; }
.po-status-UNKNOWN           { color: #999; }
/* Rec card */
.rec-card {
  background: #fff; border-left: 4px solid #999; border-radius: 4px;
  padding: 10px 12px; margin-bottom: 8px; font-size: 11px;
}
.rec-PULL_UP       { border-color: #1565c0; }
.rec-FASTER_VESSEL { border-color: #6a1b9a; }
.rec-PUSH_OUT      { border-color: #4e342e; }
.rec-CANCEL        { border-color: #880e4f; }
.rec-SPLIT         { border-color: #e65100; }
.rec-NO_LEVER      { border-color: #757575; }
.rec-card .rc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rec-card .rc-reason { color: #555; line-height: 1.5; }
.rec-card .rc-dates  { color: #37474f; margin-top: 4px; }

/* ── Misc ────────────────────────────────────────────────────────────── */
.no-results { text-align: center; padding: 40px; color: #999; font-size: 14px; }
.error-box { background: #ffebee; border: 1px solid #ef9a9a; color: #b71c1c; padding: 14px 18px; margin: 20px; border-radius: 6px; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <h2>&#127981; P+P Inventory Manager</h2>
  <div id="loading-status">Initializing...</div>

<!-- Main content (hidden until ready) -->

// ── App State ─────────────────────────────────────────────────────────────────
let tempToken = null;
let tokenExpiry = 0;
let allRecords = [];   // processed MStyleRecord-like objects
let filtered = [];

// ── QB API helpers ────────────────────────────────────────────────────────────
async function getTempToken() {
  const r = await fetch(`https://api.quickbase.com/v1/auth/temporary/${APP_DBID}`, {
    method: 'POST',
    headers: { 'QB-Realm-Hostname': REALM, 'QB-App-Token': APP_TOKEN, 'Content-Type': 'application/json' }
  });
  if (!r.ok) throw new Error(`Auth failed: ${r.status} ${await r.text()}`);
  const j = await r.json();
  tempToken = j.temporaryAuthorization;
  tokenExpiry = Date.now() + 4 * 60 * 1000;  // refresh every 4 min
  return tempToken;
}

async function ensureToken() {
  if (!tempToken || Date.now() > tokenExpiry) await getTempToken();
  return tempToken;
}

setInterval(async () => {
  if (tempToken) { try { await getTempToken(); } catch(e) { console.warn('Token refresh failed', e); } }
}, 4 * 60 * 1000);

function qbHeaders() {
  return {
    'QB-Realm-Hostname': REALM,
    'Authorization': `QB-TEMP-TOKEN ${tempToken}`,
    'Content-Type': 'application/json'
  };
}

async function qbQuery(tableId, selectIds, where, skip=0, top=1000) {
  await ensureToken();
  const body = { from: tableId, select: selectIds, options: { top, skip } };
  if (where) body.where = where;
  const r = await fetch('https://api.quickbase.com/v1/records/query', {
    method: 'POST', headers: qbHeaders(), body: JSON.stringify(body)
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`QB query failed [${tableId}]: ${r.status} — ${txt}`);
  }
  return r.json();
}

function fv(record, fid, def='') {
  const cell = record[fid];
  if (cell === undefined || cell === null) return def;
  const v = cell.value;
  if (v === undefined || v === null) return def;
  return v;
}

function fvNum(record, fid, def=0) {
  const v = fv(record, fid, null);
  if (v === null || v === '') return def;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? def : n;
}

function fvBool(record, fid) {
  const v = fv(record, fid, false);
  if (typeof v === 'boolean') return v;
  if (typeof v === 'string') return v.toLowerCase() === 'true' || v === '1';
  return !!v;
}

function fvStr(record, fid) {
  const v = fv(record, fid, '');
  if (typeof v === 'object' && v !== null) return v.name || v.email || '';
  return String(v);
}

function fvDate(record, fid) {
  const v = fv(record, fid, null);
  if (!v) return null;
  const s = typeof v === 'string' ? v.substring(0, 10) : String(v).substring(0, 10);
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function stripHtml(s) {
  if (!s) return '';
  return s.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
}

// ── Progress helpers ──────────────────────────────────────────────────────────
function setProgress(pct, msg, detail='') {
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-status').textContent = msg;
  document.getElementById('loading-steps').textContent = detail;

// ── PO Parser ─────────────────────────────────────────────────────────────────
const PO_RE = /^\s*([A-Z0-9\-]+)\s*-\s*(.+?)\s*-\s*I\/T:\s*([\d,]+)\s*pcs\s*\/\s*I\/W:\s*([\d,]+)\s*pcs\s*-\s*ETD:\s*(\d{2}-\d{2}-\d{4})\s*-\s*ETA:\s*(\d{2}-\d{2}-\d{4})/i;

function parseDate(s) {
  if (!s) return null;
  const m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (!m) return null;
  const d = new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]));
  return isNaN(d) ? null : d;
}

function parseOpenPOs(raw) {
  if (!raw) return [];
  const out = [];
  const chunks = raw.split(/[;\r\n]+/);
  for (const chunk of chunks) {
    const c = chunk.trim();
    if (!c) continue;
    const m = PO_RE.exec(c);
    if (!m) continue;
    const it = parseInt(m[3].replace(/,/g,'')) || 0;
    const iw = parseInt(m[4].replace(/,/g,'')) || 0;
    const etd = parseDate(m[5]);
    const eta = parseDate(m[6]);
    out.push({ po_number: m[1].trim(), supplier: m[2].trim(), it_qty: it, iw_qty: iw, etd, eta, qty: it + iw });
  }
  return out;
}

function poTransitDays(po) {
  if (!po.etd || !po.eta) return null;
  return Math.round((po.eta - po.etd) / 86400000);
}

function poStatus(po, todayD, country) {
  if (po.it_qty > 0) return 'IN_TRANSIT';
  if (!po.etd) return 'UNKNOWN';
  const dtd = Math.round((po.etd - todayD) / 86400000);
  if (dtd < ETD_LOCK_DAYS) return 'LOCKED';
  if (dtd >= 8 && dtd <= FASTER_VESSEL_HI) {
    return country.toUpperCase().includes('USA') ? 'PULL_UP_NARROW' : 'FASTER_VESSEL_WINDOW';
  }
  return 'MOVABLE';
}

// ── Week helpers ──────────────────────────────────────────────────────────────
function wkDate(todayD, wi) {
  // Sunday of week wi (0-indexed). Week 0 = current week.
  const d = new Date(todayD);
  const dayOfWeek = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - dayOfWeek + wi * 7);
  return d;
}

function wkIdxForDate(todayD, targetD) {
  const w1 = wkDate(todayD, 0);
  return Math.floor((targetD - w1) / (7 * 86400000));
}

function fmtDate(d) {
  if (!d) return '—';
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${m}/${day}/${d.getFullYear()}`;
}

// ── Rec Engine ────────────────────────────────────────────────────────────────
function computeDerived(rec) {
  const todayD = today;
  const beg = rec.beg;
  const prj = rec.prj;
  const open_pos = rec.open_pos;

  rec.pipeline_total = (beg[0] || 0) + open_pos.reduce((s,p)=>s+p.qty,0);
  rec.demand_26w = prj.reduce((s,v)=>s+v,0);

  if (rec.demand_26w > 0) {
    const safety = rec.opt_wos * (rec.demand_26w / 26.0);
    rec.pipeline_excess = rec.pipeline_total - rec.demand_26w - Math.round(safety);
    rec.pipeline_wos = rec.pipeline_total * 26.0 / rec.demand_26w;
  } else {
    rec.pipeline_excess = rec.pipeline_total;
    rec.pipeline_wos = rec.pipeline_total > 0 ? Infinity : 0;
  }
  rec.overstocked = (rec.pipeline_excess > OVERSTOCK_EXCESS_TH) ||
                    (rec.demand_26w > 0 && rec.pipeline_wos > OVERSTOCK_WOS_TH);

  // Gap detection
  rec.gap_weeks = [];
  if (rec.is_replen && rec.opt_wos > 0) {
    let nr_idx = rec.next_rcpt_dt ? wkIdxForDate(todayD, rec.next_rcpt_dt) : 25;
    if (nr_idx < 0) nr_idx = -1;
    const check_until = Math.min(25, nr_idx);
    for (let i = 0; i <= check_until; i++) {
      const bv = beg[i] || 0;
      const pv = prj[i] || 0;
      if (pv > 0 && (bv / pv) < rec.opt_wos) {
        rec.gap_weeks.push({
          wi: i + 1,
          date: wkDate(todayD, i),
          beg: bv, prj: pv,
          wos: Math.round(10 * bv / pv) / 10,
          deficit: Math.round(10 * (rec.opt_wos - bv / pv)) / 10
        });
      }
    }
  }

  // Recommendations
  rec.recommendations = [];
  const actionable_gaps = rec.gap_weeks.filter(g => g.deficit >= MIN_RESOLVED_GAP_DEFICIT);
  const isUSA = rec.country.toUpperCase().includes('USA') || rec.country.toUpperCase().includes('UNITED STATES');
  const wh_lag = isUSA ? USA_WAREHOUSE_LAG : WAREHOUSE_LAG;
  const movable = open_pos.filter(p => {
    const s = poStatus(p, todayD, rec.country);
    return s === 'MOVABLE' || s === 'PULL_UP_NARROW' || s === 'FASTER_VESSEL_WINDOW';
  });

  const raw_proposals = [];
  for (const gap of actionable_gaps) {
    if (!movable.length) continue;
    const gap_week_start = wkDate(todayD, gap.wi - 1);
    const target_eta = new Date(gap_week_start - wh_lag * 86400000);
    const candidates = [...movable].sort((a,b)=> (a.etd||new Date(9e15)) - (b.etd||new Date(9e15)));
    for (const po of candidates) {
      if (!po.etd) continue;
      const transit = poTransitDays(po) || rec.transit_days || 26;
      const min_etd = new Date(todayD.getTime() + ETD_LOCK_DAYS * 86400000);
      const dtd = Math.round((po.etd - todayD) / 86400000);
      const in_fast_window = dtd >= 8 && dtd <= FASTER_VESSEL_HI;
      if (in_fast_window && !isUSA) {
        const proposed_eta = new Date(po.etd.getTime() + FAST_VESSEL_TRANSIT * 86400000);
        if (proposed_eta <= new Date(target_eta.getTime() + 3 * 86400000)) {
          raw_proposals.push({ po, new_etd: po.etd, gap_wks: [gap.wi], action: 'FASTER_VESSEL' });
          break;
        }
      }
      const new_etd_ts = Math.max(min_etd.getTime(), target_eta.getTime() - transit * 86400000);
      const new_etd = new Date(new_etd_ts);
      if (new_etd >= po.etd) continue;
      const pullup_days = Math.round((po.etd - new_etd) / 86400000);
      if (pullup_days < MIN_PULLUP_DAYS) continue;
      raw_proposals.push({ po, new_etd, gap_wks: [gap.wi], action: 'PULL_UP' });
      break;
    }
  }

  // Deduplicate
  const grouped = {};
  for (const { po, new_etd, gap_wks, action } of raw_proposals) {
    const key = action + '|' + po.po_number;
    if (!grouped[key]) { grouped[key] = { po, new_etd, gap_wks: [...gap_wks] }; }
    else {
      if (new_etd < grouped[key].new_etd) grouped[key].new_etd = new_etd;
      grouped[key].gap_wks.push(...gap_wks);
    }
  }

  for (const [key, { po, new_etd, gap_wks }] of Object.entries(grouped)) {
    const action = key.split('|')[0];
    const wks = [...new Set(gap_wks)].sort((a,b)=>a-b);
    const wkStr = wks.length <= 4 ? wks.map(w=>`W${w}`).join(', ') :
      `W${wks[0]}-W${wks[wks.length-1]} (${wks.length} weeks)`;
    const transit = poTransitDays(po) || rec.transit_days || 26;
    const new_eta = new Date(new_etd.getTime() + transit * 86400000);
    if (action === 'FASTER_VESSEL') {
      const prop_eta = new Date(po.etd.getTime() + FAST_VESSEL_TRANSIT * 86400000);
      rec.recommendations.push({
        action: 'FASTER_VESSEL', po_number: po.po_number, supplier: po.supplier,
        qty_affected: po.qty, orig_etd: po.etd, proposed_etd: po.etd,
        orig_eta: po.eta, proposed_eta: prop_eta, delta_days: 0, delta_qty: 0,
        priority: 'HIGH', reason: `Request faster vessel — covers gaps in ${wkStr}`,
        gap_weeks_fixed: wks, in_transit_qty: po.it_qty, in_work_qty: po.iw_qty, po_total_qty: po.qty
      });
    } else {
      rec.recommendations.push({
        action: 'PULL_UP', po_number: po.po_number, supplier: po.supplier,
        qty_affected: po.qty, orig_etd: po.etd, proposed_etd: new_etd,
        orig_eta: po.eta, proposed_eta: new_eta,
        delta_days: Math.round((new_etd - po.etd) / 86400000), delta_qty: 0,
        priority: 'HIGH', reason: `Pull-up — covers gaps in ${wkStr}`,
        gap_weeks_fixed: wks, in_transit_qty: po.it_qty, in_work_qty: po.iw_qty, po_total_qty: po.qty
      });
    }
  }

  if (actionable_gaps.length && !rec.recommendations.length) {
    rec.recommendations.push({
      action: 'NO_LEVER', po_number: '', supplier: '', qty_affected: 0,
      orig_etd: null, proposed_etd: null, orig_eta: null, proposed_eta: null,
      delta_days: 0, delta_qty: 0, priority: 'HIGH',
      reason: `${actionable_gaps.length} actionable gap weeks but no movable PO can land in time. Live with the gap or escalate.`,
      gap_weeks_fixed: [], in_transit_qty: 0, in_work_qty: 0, po_total_qty: 0
    });
  }

  // Overstock
  if (rec.overstocked && open_pos.length) {
    const partial_min = Math.max(rec.moq > 0 ? Math.floor(rec.moq / 2) : PARTIAL_MIN_PCS, 1);
    const furthest = open_pos.reduce((a,b)=> (a.etd||new Date(0)) >= (b.etd||new Date(0)) ? a : b);
    const excess = Math.max(0, rec.pipeline_excess);
    if (furthest.etd && Math.round((furthest.etd - todayD) / 86400000) > CANCEL_HORIZON_DAYS) {
      const cancel_qty = Math.min(excess, furthest.qty);
      if (cancel_qty >= partial_min) {
        rec.recommendations.push({
          action: 'CANCEL', po_number: furthest.po_number, supplier: furthest.supplier,
          qty_affected: cancel_qty, orig_etd: furthest.etd, proposed_etd: furthest.etd,
          orig_eta: furthest.eta, proposed_eta: furthest.eta, delta_days: 0, delta_qty: -cancel_qty,
          priority: 'MEDIUM',
          reason: `Pipeline excess ${excess.toLocaleString()} pcs · ${furthest.po_number} ETD ${fmtDate(furthest.etd)} is >60d out → cancel ${cancel_qty.toLocaleString()} pcs (partial floor MOQ/2 = ${partial_min.toLocaleString()})`,
          gap_weeks_fixed: [], in_transit_qty: furthest.it_qty, in_work_qty: furthest.iw_qty, po_total_qty: furthest.qty,
          keep_qty: 0, push_qty: 0
        });
      }
    } else {
      const push_qty = Math.min(excess, furthest.qty);
      if (push_qty >= partial_min) {
        const transit = poTransitDays(furthest) || rec.transit_days || 26;
        const new_etd = furthest.etd ? new Date(furthest.etd.getTime() + 8*7*86400000) : null;
        const new_eta = new_etd ? new Date(new_etd.getTime() + transit*86400000) : null;
        const keep_qty = furthest.qty - push_qty;
        if (keep_qty >= partial_min) {
          rec.recommendations.push({
            action: 'SPLIT', po_number: furthest.po_number, supplier: furthest.supplier,
            qty_affected: push_qty, orig_etd: furthest.etd, proposed_etd: new_etd,
            orig_eta: furthest.eta, proposed_eta: new_eta,
            delta_days: (new_etd && furthest.etd) ? Math.round((new_etd-furthest.etd)/86400000) : 0, delta_qty: 0,
            priority: 'MEDIUM',
            reason: `Split shipment — keep ${keep_qty.toLocaleString()} at original ETD, push ${push_qty.toLocaleString()} to free up early-window inventory`,
            gap_weeks_fixed: [], in_transit_qty: furthest.it_qty, in_work_qty: furthest.iw_qty, po_total_qty: furthest.qty,
            keep_qty, push_qty
          });
        } else {
          rec.recommendations.push({
            action: 'PUSH_OUT', po_number: furthest.po_number, supplier: furthest.supplier,
            qty_affected: furthest.qty, orig_etd: furthest.etd, proposed_etd: new_etd,
            orig_eta: furthest.eta, proposed_eta: new_eta,
            delta_days: (new_etd && furthest.etd) ? Math.round((new_etd-furthest.etd)/86400000) : 0, delta_qty: 0,
            priority: 'MEDIUM',
            reason: `Push entire PO out ~8 weeks — splitting would leave a partial below MOQ/2 = ${partial_min.toLocaleString()}`,
            gap_weeks_fixed: [], in_transit_qty: furthest.it_qty, in_work_qty: furthest.iw_qty, po_total_qty: furthest.qty,
            keep_qty: 0, push_qty: furthest.qty
          });
        }
      }
    }
  }

  // Priority roll-up
  if (rec.recommendations.some(r => r.priority === 'CRITICAL')) rec.priority = 'CRITICAL';
  else if (rec.gap_weeks.some(g => g.deficit >= 2.0)) rec.priority = 'HIGH';
  else if (rec.gap_weeks.length || rec.overstocked) rec.priority = 'MEDIUM';
  else rec.priority = 'LOW';
}

// ── Priority sort order ───────────────────────────────────────────────────────
const PRI_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };

// ── Data loading ──────────────────────────────────────────────────────────────
async function fetchAllPages(tableId, selectIds, where) {
  let skip = 0;
  const top = 1000;
  let all = [];
  let page = 1;
  // Fetch first page
  const first = await qbQuery(tableId, selectIds, where, 0, top);
  all = all.concat(first.data || []);
  const total = first.metadata?.totalRecords || all.length;
  const numPages = Math.ceil(total / top);
  setProgress(null, `Loading table (page 1/${numPages})...`);
  if (numPages > 1) {
    // Fetch remaining pages in series (rate-limit friendly)
    for (let p = 2; p <= numPages; p++) {
      const res = await qbQuery(tableId, selectIds, where, (p-1)*top, top);
      all = all.concat(res.data || []);
    }
  }
  return all;
}

async function fetchInvFlow(onProgress) {
  onProgress(0, 'Loading Inventory Flow (page 1/?)...');
  let skip = 0, top = 1000, all = [], page = 1;
  const first = await qbQuery(INVF_TID, INVF_SELECT_IDS, null, 0, top);
  all = all.concat(first.data || []);
  const total = first.metadata?.totalRecords || all.length;
  const numPages = Math.ceil(total / top);
  for (let p = 2; p <= numPages; p++) {
    onProgress(Math.round((p-1)/numPages*40), `Loading Inventory Flow (page ${p}/${numPages})...`);
    const res = await qbQuery(INVF_TID, INVF_SELECT_IDS, null, (p-1)*top, top);
    all = all.concat(res.data || []);
  }
  onProgress(40, `Inventory Flow loaded: ${all.length} records`);
  return all;
}

async function fetchProjections(onProgress) {
  onProgress(40, 'Loading Projections (page 1/?)...');
  const where = `{${PROJ.status_cust}.SW.A} OR {${PROJ.status_cust}.SW.FD}`;
  let all = [], top = 1000;
  const first = await qbQuery(PROJ_TID, PROJ_SELECT_IDS, where, 0, top);
  all = all.concat(first.data || []);
  const total = first.metadata?.totalRecords || all.length;
  const numPages = Math.ceil(total / top);
  for (let p = 2; p <= numPages; p++) {
    onProgress(40 + Math.round((p-1)/numPages*35), `Loading Projections (page ${p}/${numPages})...`);
    const res = await qbQuery(PROJ_TID, PROJ_SELECT_IDS, where, (p-1)*top, top);
    all = all.concat(res.data || []);
  }
  onProgress(75, `Projections loaded: ${all.length} rows`);
  return all;
}

    const ms = fvStr(r, PROJ.mstyle);
    if (!ms) continue;
    if (!projMap[ms]) {
      projMap[ms] = {
        description: stripHtml(fvStr(r, PROJ.description)),
        brand: fvStr(r, PROJ.brand),
        inv_managers: new Set(),
        item_statuses: [],
        customer_count: 0,
        manual_demand_26w: 0,
      };
    }
    const d = projMap[ms];
    const status = fvStr(r, PROJ.status_cust);
    const pt_status = fvStr(r, PROJ.pt_item_status);
    if (pt_status) d.item_statuses.push(pt_status);
    d.customer_count++;
    const weeklyDemand = MANUAL_W_IDS.reduce((s,id)=>s+fvNum(r,id),0);
    d.manual_demand_26w += weeklyDemand;
  }

  onProgress(85, 'Computing recommendations...');

  // Build final records
  const records = [];
  for (const [ms, ivf] of Object.entries(invMap)) {
    const pr = projMap[ms] || {};
    // Most common item_status
    let item_status = '';
    if (pr.item_statuses && pr.item_statuses.length) {
      const counts = {};
      for (const s of pr.item_statuses) counts[s] = (counts[s]||0)+1;
      item_status = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    }
    const is_replen = item_status.toLowerCase().includes('replen');

    // Inv manager name
    let inv_manager = '';
    if (ivf.inv_manager_raw) {
      const v = ivf.inv_manager_raw;
      if (typeof v === 'object' && v !== null) inv_manager = v.name || v.email || '';
      else inv_manager = String(v);
    }

    const rec = {
      ...ivf,
      description: pr.description || '',
      brand: pr.brand || '',
      inv_manager,
      item_status,
      is_replen,
      customer_count: pr.customer_count || 0,
      manual_demand_26w: pr.manual_demand_26w || 0,
      open_pos: parseOpenPOs(ivf.open_pos_raw),
      // Derived (filled by computeDerived)
      pipeline_total: 0, demand_26w: 0, pipeline_excess: 0, pipeline_wos: 0,
      overstocked: false, gap_weeks: [], recommendations: [], priority: 'LOW',
    };
    computeDerived(rec);
    records.push(rec);
  }

  onProgress(95, 'Sorting...');
  records.sort((a,b)=>{
    const pd = PRI_ORDER[a.priority] - PRI_ORDER[b.priority];
    if (pd !== 0) return pd;
    const gd = b.gap_weeks.length - a.gap_weeks.length;
    if (gd !== 0) return gd;
    return a.mstyle.localeCompare(b.mstyle);
  });

  return records;
}

// ── Cache helpers ─────────────────────────────────────────────────────────────
function saveCache(records) {
  try {
    // Serialize dates to ISO strings
    const serial = JSON.stringify({ ts: Date.now(), records }, (key, val) => {
      if (val instanceof Date) return { __date__: val.toISOString() };
      return val;
    });
    localStorage.setItem(CACHE_KEY, serial);
  } catch(e) { console.warn('Cache save failed', e); }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw, (key, val) => {
      if (val && typeof val === 'object' && val.__date__) return new Date(val.__date__);
      return val;
    });
    if (Date.now() - parsed.ts > CACHE_TTL) return null;
    return parsed;
  } catch(e) { return null; }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function n(v, dec=0) {
  if (v === null || v === undefined || v === '') return '—';
  if (typeof v === 'number' && !isFinite(v)) return '∞';
  const num = typeof v === 'number' ? v : parseFloat(v);
  if (isNaN(num)) return '—';
  return num.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function flag(v, label) {
  return `<span class="${v ? 'flag-on' : 'flag-off'}">${v ? label : label}</span>`;
}

function pillHtml(pri) {
  return `<span class="pill pill-${pri}">${pri}</span>`;
}

function actionPill(action) {
  if (!action) return '<span class="act-none">—</span>';
  return `<span class="pill act-${action}" style="font-size:10px">${action.replace(/_/g,' ')}</span>`;
}

function wosClass(wos, opt_wos) {
  if (!isFinite(wos) || wos === 0) return '';
  if (wos < opt_wos) return 'wos-red';
  if (wos < opt_wos * 1.5) return 'wos-orange';
  if (wos > OVERSTOCK_WOS_TH) return 'wos-blue';
  return 'wos-ok';
}

// ── Build dropdown options ────────────────────────────────────────────────────
function buildDropdowns() {
  const actions = new Set(), countries = new Set(), brands = new Set(), mgrs = new Set();
  for (const r of allRecords) {
    const act = r.recommendations[0]?.action;
    if (act) actions.add(act);
    if (r.country) countries.add(r.country);
    if (r.brand) brands.add(r.brand);
    if (r.inv_manager) mgrs.add(r.inv_manager);
  }
  const fill = (id, vals) => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = el.options[0].outerHTML;
    [...vals].sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      el.appendChild(o);
    });
    if (cur) el.value = cur;
  };
  fill('f-action', actions);
  fill('f-country', countries);
  fill('f-brand', brands);
  fill('f-mgr', mgrs);
}

// ── Stats update ──────────────────────────────────────────────────────────────
function updateStats() {
  const cnt = { ALL: allRecords.length, CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
  let gaps = 0, over = 0;
  for (const r of allRecords) {
    cnt[r.priority] = (cnt[r.priority]||0) + 1;
    if (r.gap_weeks.length) gaps++;
    if (r.overstocked) over++;
  }
  document.getElementById('cnt-all').textContent = cnt.ALL;
  document.getElementById('cnt-crit').textContent = cnt.CRITICAL;
  document.getElementById('cnt-high').textContent = cnt.HIGH;
  document.getElementById('cnt-med').textContent = cnt.MEDIUM;
  document.getElementById('cnt-low').textContent = cnt.LOW;
  document.getElementById('stat-gaps').textContent = `${gaps} with gaps`;
  document.getElementById('stat-over').textContent = `${over} overstocked`;
}

// ── Filter + Sort + Render ────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const fAction = document.getElementById('f-action').value;
  const fCountry = document.getElementById('f-country').value;
  const fBrand = document.getElementById('f-brand').value;
  const fMgr = document.getElementById('f-mgr').value;
  const chkReplen = document.getElementById('chk-replen').checked;
  const chkGaps = document.getElementById('chk-gaps').checked;
  const chkOver = document.getElementById('chk-over').checked;
  const chkNoMulti = document.getElementById('chk-nomulti').checked;

  filtered = allRecords.filter(r => {
    if (activePri !== 'ALL' && r.priority !== activePri) return false;
    if (search && !r.mstyle.toLowerCase().includes(search) &&
        !r.description.toLowerCase().includes(search) &&
        !r.brand.toLowerCase().includes(search)) return false;
    if (fAction && r.recommendations[0]?.action !== fAction) return false;
    if (fCountry && r.country !== fCountry) return false;
    if (fBrand && r.brand !== fBrand) return false;
    if (fMgr && r.inv_manager !== fMgr) return false;
    if (chkReplen && !r.is_replen) return false;
    if (chkGaps && !r.gap_weeks.length) return false;
    if (chkOver && !r.overstocked) return false;
    if (chkNoMulti && r.is_multi) return false;
    return true;
  });

  // Sort
  filtered.sort((a,b)=>{
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'priority') { av = PRI_ORDER[a.priority]; bv = PRI_ORDER[b.priority]; }
    if (sortCol === 'gaps') { av = a.gap_weeks.length; bv = b.gap_weeks.length; }
    if (sortCol === 'action') { av = a.recommendations[0]?.action||''; bv = b.recommendations[0]?.action||''; }
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === bv) return 0;
    const cmp = av < bv ? -1 : 1;
    return sortAsc ? cmp : -cmp;
  });

  document.getElementById('stat-shown').textContent = `${filtered.length} shown`;
  renderTable();
}

function setPriFilter(pri) {
  activePri = pri;
  document.querySelectorAll('.pri-btn').forEach(b => b.classList.toggle('active', b.dataset.pri === pri));
  applyFilters();
}

let sortDir = {};
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = col === 'priority' || col === 'mstyle'; }
  // Update arrows
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  const arrow = document.getElementById(`sa-${col}`);
  if (arrow) arrow.textContent = sortAsc ? '▲' : '▼';
  applyFilters();
}

// ── Table rendering ───────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  const nr = document.getElementById('no-results');
  if (!filtered.length) { nr.style.display = ''; return; }
  nr.style.display = 'none';

  for (const rec of filtered) {
    const tr = document.createElement('tr');
    if (rec.gap_weeks.length) tr.classList.add('gap-row');
    else if (rec.overstocked) tr.classList.add('over-row');
    if (rec.mstyle === openDetailMstyle) tr.classList.add('detail-open');
    tr.dataset.mstyle = rec.mstyle;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => toggleDetail(rec, tr));

    const wos = rec.pipeline_wos;
    const wc = wosClass(wos, rec.opt_wos);
    const wosStr = isFinite(wos) && wos > 0 ? n(wos, 1) : (wos === Infinity ? '∞' : '0.0');
    const act = rec.recommendations[0]?.action || null;

    tr.innerHTML = `
      <td class="mstyle-cell">
        <div class="ms">${esc(rec.mstyle)}</div>
        <div class="desc" title="${esc(rec.description)}">${esc(rec.description)}</div>
      </td>
      <td>${esc(rec.country)}</td>
      <td>${pillHtml(rec.priority)}</td>
      <td>${rec.gap_weeks.length ? `<span class="gap-badge">${rec.gap_weeks.length}</span>` : '<span style="color:#bbb">0</span>'}</td>
      <td><span class="${wc}">${wosStr}</span></td>
      <td>${n(rec.prj_wk, 0)}</td>
      <td>${n(rec.qty_oh)}</td>
      <td>${n(rec.it_iw)}</td>
      <td>${actionPill(act)}</td>
      <td style="white-space:nowrap;font-size:11px">${esc(rec.inv_manager||'—')}</td>
    `;
    tbody.appendChild(tr);

    if (rec.mstyle === openDetailMstyle) {
      tbody.appendChild(buildDetailRow(rec));
    }
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Detail pane ───────────────────────────────────────────────────────────────
function toggleDetail(rec, tr) {
  if (openDetailMstyle === rec.mstyle) {
    openDetailMstyle = null;
  } else {
    openDetailMstyle = rec.mstyle;
  }
  renderTable();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && openDetailMstyle) {
    openDetailMstyle = null;
    renderTable();
  }
});

function buildDetailRow(rec) {
  const detailTr = document.createElement('tr');
  detailTr.className = 'detail-row';
  const td = document.createElement('td');
  td.colSpan = 10;
  td.innerHTML = buildDetailHtml(rec);
  detailTr.appendChild(td);
  return detailTr;
}

function kv(label, val) {
  return `<div class="k">${label}</div><div class="v">${val}</div>`;
}

function flagKV(label, val) {
  const cls = val ? 'flag-on' : 'flag-off';
  return `<div class="k">${label}</div><div class="v ${cls}">${val ? 'YES' : 'No'}</div>`;
}

  if (hasNotes) {
    html.push('<div class="dp-card" style="grid-column:1/-1"><h3>Notes</h3>');
    const noteField = (label, val) => {
      if (!val) return '';
      return `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#37474f;margin-bottom:4px">${label}</div><div class="dp-note">${esc(val)}</div></div>`;
    };
    html.push(noteField('Shipment Status Summary', rec.shipment_status_summary));
    html.push(noteField('ATS Summary', rec.ats_summary));
    html.push(noteField('Inventory Notes', rec.inventory_notes));
    html.push(noteField('Style Alert', rec.style_alert));
    html.push(noteField('OOS Priority Notes', rec.oos_priority_notes));
    html.push(noteField('Active Replen Customers', rec.active_replen_customers));
    html.push('</div>');
  }

  html.push('</div>'); // end dp-grid row 2
  html.push('</div>'); // end detail-pane
  return html.join('');
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function main() {
  try {
    setProgress(2, 'Checking cache...');
    const cached = loadCache();
    let records;

    if (cached) {
      setProgress(80, 'Using cached data...', `Cached ${new Date(cached.ts).toLocaleString()}`);
      records = cached.records;
      // Re-run computeDerived since dates were deserialized
      today = new Date();
      today.setHours(0,0,0,0);
    } else {
      // Step 1: Auth
      setProgress(3, 'Getting auth token...');
      await getTempToken();
      setProgress(5, 'Auth OK');

      // Step 2: Inventory Flow
      const invFlowRows = await fetchInvFlow((pct, msg) => setProgress(5 + pct*0.35, msg));

      // Step 3: Projections
      const projRows = await fetchProjections((pct, msg) => setProgress(40 + pct*0.35, msg));

      // Step 4: Build
      setProgress(75, 'Building records...');
      records = buildRecords(invFlowRows, projRows, (pct, msg) => setProgress(pct, msg));

      // Cache
      saveCache(records);
    }

    allRecords = records;
    filtered = [...allRecords];

    // Update UI
    updateStats();
    buildDropdowns();
    sortBy('priority');

    // Data timestamp
    const ts = cached ? new Date(cached.ts) : new Date();
    document.getElementById('data-ts').textContent = `Data as of ${ts.toLocaleString()}`;

    setProgress(100, 'Ready!');
    await new Promise(r => setTimeout(r, 400));

    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('app').style.display = '';

  } catch(err) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('app').style.display = '';
    const wrap = document.getElementById('table-wrap');
    wrap.innerHTML = `<div class="error-box"><strong>Error loading data:</strong><br>${esc(String(err))}<br><br>
      <small>Make sure you are logged in to QuickBase (pim.quickbase.com) in this browser. If you recently logged in, try refreshing the page.</small>
      <br><br><button onclick="localStorage.removeItem('${CACHE_KEY}');location.reload()">Clear Cache &amp; Retry</button></div>`;
  }
}

main();
</script>
</body>
</html>
