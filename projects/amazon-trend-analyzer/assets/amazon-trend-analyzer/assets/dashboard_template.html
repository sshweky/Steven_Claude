<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amazon Trend Analyzer</title>
<style>
  :root {
    --bg:#f7f6f1; --surface:#fff; --surface-2:#f1efe8; --border:#dcd9cf;
    --text:#1f1e1c; --muted:#6b6a64; --hint:#9a988f;
    --accent:#0c447c; --accent-bg:#e6f1fb;
    --success:#0f6e56; --success-bg:#e1f5ee;
    --warning:#854f0b; --warning-bg:#faeeda;
    --danger:#791f1f; --danger-bg:#fcebeb;
    --neutral:#444441; --neutral-bg:#f1efe8;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    font-size:14px;line-height:1.5}
  h1,h2,h3,h4{margin:0;font-weight:500}
  h1{font-size:22px} h2{font-size:18px} h3{font-size:16px} h4{font-size:14px}
  button{font:inherit;color:inherit;background:transparent;border:1px solid var(--border);
    border-radius:6px;padding:6px 12px;cursor:pointer}
  button:hover{background:var(--surface-2)}
  button.active{background:var(--accent-bg);color:var(--accent);border-color:#b5d4f4}
  select,input[type=text]{font:inherit;color:inherit;background:var(--surface);
    border:1px solid var(--border);border-radius:6px;padding:6px 10px}
  .app{display:grid;grid-template-rows:auto auto 1fr;height:100vh}

  /* Header */
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between}
  .hdr .ttl{display:flex;flex-direction:column;gap:2px}
  .hdr .ttl .sub{color:var(--muted);font-size:12px}
  .hdr .meta{display:flex;gap:24px;align-items:center;color:var(--muted);font-size:12px}

  /* Summary bar */
  .summary{padding:16px 24px;display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;
    background:var(--surface);border-bottom:1px solid var(--border)}
  .tile{background:var(--surface-2);border-radius:8px;padding:12px 14px}
  .tile .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .tile .val{font-size:22px;font-weight:500;margin-top:4px}
  .tile .delta{font-size:12px;color:var(--muted);margin-top:2px}
  .tile.success .val{color:var(--success)} .tile.success{background:var(--success-bg)}
  .tile.danger  .val{color:var(--danger)}  .tile.danger {background:var(--danger-bg)}
  .tile.warning .val{color:var(--warning)} .tile.warning{background:var(--warning-bg)}

  /* Main layout: table + side panel */
  .main{display:grid;grid-template-columns:1fr;overflow:hidden}
  .main.with-panel{grid-template-columns:1fr 560px}
  .table-pane{overflow:auto;padding:16px 24px}
  .panel{background:var(--surface);border-left:1px solid var(--border);overflow:auto;padding:20px 24px}

  /* Filter bar */
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
  .filters .lbl{font-size:12px;color:var(--muted);margin-right:6px}
  .chip{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;
    background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;gap:4px;
    transition:background .12s}
  .chip:hover{background:var(--surface-2)}
  .chip.active{background:var(--accent-bg);color:var(--accent);border-color:#b5d4f4}
  .chip .cnt{font-size:11px;opacity:.7;margin-left:2px}

  /* Bucket badge colours */
  .b-strong_winner    {background:var(--success-bg);color:var(--success)}
  .b-accelerating     {background:#fbeaf0;color:#993556}
  .b-recovering       {background:var(--accent-bg);color:var(--accent)}
  .b-stable           {background:var(--neutral-bg);color:var(--neutral)}
  .b-soft             {background:var(--neutral-bg);color:var(--neutral)}
  .b-cooling_winner   {background:var(--warning-bg);color:var(--warning)}
  .b-surge_on_decline {background:var(--warning-bg);color:var(--warning)}
  .b-lapping_softness {background:var(--neutral-bg);color:var(--neutral)}
  .b-new_decline      {background:var(--danger-bg);color:var(--danger)}
  .b-sustained_decline{background:var(--danger-bg);color:var(--danger)}
  .b-no_data          {background:var(--neutral-bg);color:var(--neutral)}

  /* Data table */
  table.dt{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);
    border:1px solid var(--border);border-radius:8px;overflow:hidden}
  table.dt th,table.dt td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
  table.dt th{background:var(--surface-2);font-weight:500;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap}
  table.dt th.num{text-align:right}
  table.dt td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.dt tr:hover td{background:var(--surface-2)}
  table.dt tr.selected td{background:var(--accent-bg)}
  table.dt tr{cursor:pointer}
  table.dt td.desc{max-width:280px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;color:var(--muted);font-size:12.5px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;
    white-space:nowrap}
  .mono{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12px}
  .pos{color:var(--success)} .neg{color:var(--danger)} .neutral{color:var(--muted)}
  .flag{font-size:10px;padding:1px 6px;border-radius:8px;background:#fbeaf0;color:#993556;margin-left:4px}
  .flag.vol{background:#faeeda;color:#854f0b}

  /* Sparkline */
  .spark{display:inline-block;width:80px;height:24px;vertical-align:middle}

  /* Panel */
  .panel-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
  .panel-hdr .x{font-size:18px;color:var(--muted);cursor:pointer;background:none;border:none;padding:0}
  .panel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0}
  .panel-grid .tile{padding:10px 12px}
  .panel-grid .tile .val{font-size:18px}
  .panel-chart{position:relative;height:230px;margin:6px 0 8px}
  .chart-header{display:flex;justify-content:space-between;align-items:flex-end;
    flex-wrap:wrap;gap:8px;margin:6px 0 4px}
  .chart-title{font-size:13px;font-weight:500;color:var(--text)}
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted)}
  .chart-legend .lk{display:inline-flex;align-items:center;gap:5px}
  .chart-legend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}
  .chart-legend .sw.line{height:2px;border-radius:0}
  .chart-legend .sw.dashed{background:transparent !important;border-top:2px dashed #7F77DD;height:0;width:14px}
  .panel-toggle{display:flex;gap:6px;margin:8px 0 14px;flex-wrap:wrap}
  .panel-toggle .chip{font-size:11px;padding:3px 8px}
  .narr{padding:10px 12px;background:var(--surface-2);border-radius:6px;font-size:13px;
    margin:14px 0;border-left:3px solid var(--accent)}
  .driver-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
  .driver-row:last-child{border-bottom:none}
  .driver-row .nm{color:var(--muted);font-size:13px}
  .driver-row .vl{font-weight:500;font-variant-numeric:tabular-nums}

  .pagination{display:flex;justify-content:space-between;align-items:center;margin-top:12px;
    padding:8px 0;font-size:13px;color:var(--muted)}
  .pagination button{padding:4px 10px}

  .empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script id="payload" type="application/json">__PAYLOAD_JSON__</script>

<script type="text/babel" data-presets="react">
const {useState,useMemo,useEffect,useRef} = React;

// -------------- Data load --------------
const PAYLOAD = JSON.parse(document.getElementById("payload").textContent);
window.__PAYLOAD = PAYLOAD; // debug hook

const BUCKETS = [
  {key:"strong_winner",     label:"🚀 Strong winner"},
  {key:"accelerating",      label:"🔥 Accelerating"},
  {key:"recovering",        label:"🔄 Recovering"},
  {key:"cooling_winner",    label:"🧊 Cooling winner"},
  {key:"surge_on_decline",  label:"⚠️ Surge on decline"},
  {key:"stable",            label:"😴 Stable"},
  {key:"soft",              label:"💤 Soft"},
  {key:"lapping_softness",  label:"🔄 Lapping softness"},
  {key:"new_decline",       label:"📉 New decline"},
  {key:"sustained_decline", label:"💀 Sustained decline"},
  {key:"no_data",           label:"— No data"},
];

const fmt$  = (n) => n==null?"—":"$"+Math.round(n).toLocaleString();
const fmtK  = (n) => n==null?"—":n>=1000?"$"+(n/1000).toFixed(1)+"k":fmt$(n);
const fmtN  = (n) => n==null?"—":Math.round(n).toLocaleString();
const fmtPct = (n) => n==null?"—":((n>=0?"+":"")+(n*100).toFixed(1)+"%");
const fmtIdx = (n) => n==null?"—":((n-1>=0?"+":"")+((n-1)*100).toFixed(1)+"%");
const cls = (n) => n==null||Math.abs(n-1)<0.005?"neutral":n>1?"pos":"neg";
const clsPct = (n) => n==null||Math.abs(n)<0.005?"neutral":n>0?"pos":"neg";

// -------------- Sparkline (mini SVG) --------------
function Spark({data, color="#0c447c"}){
  if(!data || data.length<2) return <span className="hint">—</span>;
  const w=80,h=24,pad=2;
  const min = Math.min(...data), max=Math.max(...data);
  const range = max-min || 1;
  const pts = data.map((v,i)=>{
    const x = pad + (w-2*pad) * (i/(data.length-1));
    const y = h-pad - (h-2*pad) * ((v-min)/range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.2" />
    </svg>
  );
}

// -------------- Bucket badge --------------
function Badge({bucket, label}){
  return <span className={`badge b-${bucket||"no_data"}`}>{label}</span>;
}

// -------------- Trend chart in drill-down --------------
function TrendChart({asin, weekly, overlay}){
  const ref = useRef();
  const chartRef = useRef();

  useEffect(()=>{
    if(!ref.current || !weekly?.length) return;
    if(chartRef.current) chartRef.current.destroy();

    const labels = weekly.map(w => w.wk.slice(5));
    const units = weekly.map(w => w.u || 0);
    const revenue = weekly.map(w => w.r || 0);
    const overlaySeries = weekly.map(w => overlay==="gv" ? (w.gv||0) :
                                            overlay==="cr" ? ((w.cr||0)*100) :
                                            overlay==="asp"?(w.asp||0) :
                                            overlay==="bsr"?(w.bsr||0) : null);
    const overlayLabel = overlay==="gv"?"Glance views":overlay==="cr"?"Conv rate (%)":
                          overlay==="asp"?"ASP ($)":overlay==="bsr"?"BSR":"";

    const colors = weekly.map((_,i)=> i>=weekly.length-4 ? "#BA7517" : "#378ADD");

    const datasets = [
      {type:"bar", label:"Units", data:units, yAxisID:"y",
        backgroundColor:colors, borderRadius:2, order:3},
      {type:"line", label:"Revenue ($)", data:revenue, yAxisID:"y2",
        borderColor:"#1D9E75", backgroundColor:"transparent", borderWidth:1.8,
        pointRadius:0, tension:0.3, order:2}
    ];
    if(overlay && overlay!=="none"){
      datasets.push({
        type:"line", label:overlayLabel, data:overlaySeries, yAxisID:"y3",
        borderColor:"#7F77DD", backgroundColor:"transparent", borderWidth:1.5,
        borderDash:[3,3], pointRadius:0, tension:0.25, order:1
      });
    }

    chartRef.current = new Chart(ref.current, {
      data:{labels, datasets},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{mode:"index", intersect:false}},
        interaction:{mode:"index", intersect:false},
        scales:{
          x:{ticks:{autoSkip:true, maxRotation:0, color:"#9a988f", font:{size:9}},
             grid:{display:false}},
          y:{position:"left", beginAtZero:true,
             ticks:{color:"#9a988f", font:{size:9}, callback:v=>v.toLocaleString()},
             grid:{color:"rgba(155,152,140,0.12)"},
             title:{display:true, text:"Units", color:"#9a988f", font:{size:10}}},
          y2:{position:"right", beginAtZero:true,
              ticks:{color:"#9a988f", font:{size:9}, callback:v=>"$"+(v/1000).toFixed(1)+"k"},
              grid:{display:false},
              title:{display:true, text:"Revenue", color:"#9a988f", font:{size:10}}},
          ...(overlay && overlay!=="none" ? {
            y3:{position:"right", display:false}
          } : {})
        }
      }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [asin, weekly, overlay]);

  return <canvas ref={ref} role="img" aria-label={`52-week trend chart for ${asin}`} />;
}

// -------------- Drill-down panel --------------
function Panel({asin, onClose, baselineMode, setBaselineMode}){
  const [overlay, setOverlay] = useState("none");
  if(!asin) return null;
  const suffix = baselineMode==="exclusive" ? "_exc" : "_inc";
  const ui = asin.units_indices, ri = asin.revenue_indices;
  const comp13 = asin.composite["l4_vs_l13"];
  const comp26 = asin.composite["l4_vs_l26"];
  const comp52 = asin.composite["l4_vs_l52"];
  const u4 = (asin.weekly||[]).slice(-4).reduce((a,w)=>a+(w.u||0),0);
  const r4 = (asin.weekly||[]).slice(-4).reduce((a,w)=>a+(w.r||0),0);

  return (
    <div className="panel">
      <div className="panel-hdr">
        <div>
          <div className="mono" style={{fontSize:12,color:"var(--muted)"}}>{asin.asin} · {asin.brand}</div>
          <h3 style={{marginTop:4}}>{asin.description || "—"}</h3>
          <div style={{marginTop:8, display:"flex", gap:6, flexWrap:"wrap"}}>
            <Badge bucket={asin.bucket} label={asin.bucket_label} />
            {asin.mixed_signal && <span className="flag">🔀 Mixed signal</span>}
            {asin.volatile && <span className="flag vol">📊 Volatile</span>}
          </div>
        </div>
        <button className="x" onClick={onClose} aria-label="Close panel">✕</button>
      </div>

      {/* Three trend windows */}
      <div className="panel-grid">
        <div className="tile">
          <div className="lbl">L4W vs L13W</div>
          <div className={`val ${cls(comp13)}`}>{fmtIdx(comp13)}</div>
          <div className="delta mono">Units {fmtIdx(ui["l4_vs_l13"+suffix])} · Rev {fmtIdx(ri["l4_vs_l13"+suffix])}</div>
        </div>
        <div className="tile">
          <div className="lbl">L4W vs L26W</div>
          <div className={`val ${cls(comp26)}`}>{fmtIdx(comp26)}</div>
          <div className="delta mono">Units {fmtIdx(ui["l4_vs_l26"+suffix])} · Rev {fmtIdx(ri["l4_vs_l26"+suffix])}</div>
        </div>
        <div className="tile">
          <div className="lbl">L4W vs L52W</div>
          <div className={`val ${cls(comp52)}`}>{fmtIdx(comp52)}</div>
          <div className="delta mono">Units {fmtIdx(ui["l4_vs_l52"+suffix])} · Rev {fmtIdx(ri["l4_vs_l52"+suffix])}</div>
        </div>
      </div>

      {/* Baseline mode toggle */}
      <div className="panel-toggle">
        <span style={{fontSize:11,color:"var(--muted)",marginRight:6,alignSelf:"center"}}>Baseline:</span>
        <span className={`chip ${baselineMode==="exclusive"?"active":""}`} onClick={()=>setBaselineMode("exclusive")}>Exclusive</span>
        <span className={`chip ${baselineMode==="inclusive"?"active":""}`} onClick={()=>setBaselineMode("inclusive")}>Inclusive</span>
      </div>

      {/* Chart with overlay toggle */}
      <div className="panel-toggle">
        <span style={{fontSize:11,color:"var(--muted)",marginRight:6,alignSelf:"center"}}>Overlay:</span>
        {["none","gv","cr","asp","bsr"].map(o => (
          <span key={o} className={`chip ${overlay===o?"active":""}`} onClick={()=>setOverlay(o)}>
            {o==="none"?"None":o==="gv"?"Glance views":o==="cr"?"Conv rate":o==="asp"?"ASP":"BSR"}
          </span>
        ))}
      </div>
      <div className="chart-header">
        <div className="chart-title">Weekly trend · last 52 weeks</div>
        <div className="chart-legend">
          <span className="lk"><span className="sw" style={{background:"#378ADD"}}></span>Ordered units</span>
          <span className="lk"><span className="sw" style={{background:"#BA7517"}}></span>L4W window</span>
          <span className="lk"><span className="sw line" style={{background:"#1D9E75"}}></span>Ordered revenue ($)</span>
          {overlay !== "none" && (
            <span className="lk"><span className="sw line dashed" style={{background:"#7F77DD"}}></span>{
              overlay==="gv"?"Glance views":overlay==="cr"?"Conv rate (%)":overlay==="asp"?"ASP ($)":"BSR"
            }</span>
          )}
        </div>
      </div>
      <div className="panel-chart">
        <TrendChart asin={asin.asin} weekly={asin.weekly} overlay={overlay} />
      </div>

      {/* Narrative */}
      <div className="narr">{asin.drivers_narrative}</div>

      {/* Drivers ranked */}
      <h4 style={{marginTop:18,marginBottom:8}}>Drivers · L4W vs L13W</h4>
      {(asin.drivers_ranked||[]).length===0 && <div className="empty" style={{padding:0}}>No driver changes large enough to flag.</div>}
      {(asin.drivers_ranked||[]).map((d,i)=>(
        <div className="driver-row" key={i}>
          <div className="nm">{d.label}</div>
          <div className={`vl ${d.direction==="positive"?"pos":d.direction==="negative"?"neg":"neutral"}`}>{d.value_fmt}</div>
        </div>
      ))}

      {/* L4W totals */}
      <h4 style={{marginTop:18,marginBottom:8}}>L4W totals</h4>
      <div className="driver-row"><div className="nm">Units (4W sum)</div><div className="vl mono">{fmtN(u4)}</div></div>
      <div className="driver-row"><div className="nm">Revenue (4W sum)</div><div className="vl mono">{fmt$(r4)}</div></div>
      <div className="driver-row"><div className="nm">Brand</div><div className="vl">{asin.brand}</div></div>
      <div className="driver-row"><div className="nm">Master brand</div><div className="vl">{asin.master_brand}</div></div>
      {asin.pack_size && <div className="driver-row"><div className="nm">Pack size</div><div className="vl">{asin.pack_size}</div></div>}
      {asin.list_price && <div className="driver-row"><div className="nm">List price</div><div className="vl">{fmt$(asin.list_price)}</div></div>}
    </div>
  );
}

// -------------- Main app --------------
function App(){
  const [selected, setSelected]   = useState(null);
  const [bucketFilter, setBucketFilter] = useState("all");
  const [brandFilter, setBrandFilter]   = useState("all");
  const [search, setSearch]       = useState("");
  const [flagFilter, setFlagFilter] = useState("all"); // all|mixed|volatile
  const [sortBy, setSortBy]       = useState("composite_l13");
  const [sortDir, setSortDir]     = useState("desc");
  const [page, setPage]           = useState(0);
  const [baselineMode, setBaselineMode] = useState("exclusive");
  const ROWS_PER_PAGE = 50;

  const brands = useMemo(() => {
    const s = new Set(PAYLOAD.asins.map(a => a.brand).filter(Boolean));
    return ["all", ...Array.from(s).sort()];
  }, []);
  const bucketCounts = useMemo(() => {
    const m = {};
    PAYLOAD.asins.forEach(a => { m[a.bucket] = (m[a.bucket]||0)+1; });
    return m;
  }, []);

  const filtered = useMemo(() => {
    let rows = PAYLOAD.asins;
    if(bucketFilter !== "all") rows = rows.filter(a => a.bucket === bucketFilter);
    if(brandFilter !== "all") rows = rows.filter(a => a.brand === brandFilter);
    if(flagFilter === "mixed") rows = rows.filter(a => a.mixed_signal);
    if(flagFilter === "volatile") rows = rows.filter(a => a.volatile);
    if(search.trim()){
      const q = search.trim().toLowerCase();
      rows = rows.filter(a =>
        a.asin.toLowerCase().includes(q) ||
        (a.description||"").toLowerCase().includes(q) ||
        (a.brand||"").toLowerCase().includes(q));
    }
    rows = rows.slice().sort((a,b) => {
      let av, bv;
      if(sortBy === "composite_l13"){ av=a.composite?.l4_vs_l13 ?? 0; bv=b.composite?.l4_vs_l13 ?? 0; }
      else if(sortBy === "composite_l52"){ av=a.composite?.l4_vs_l52 ?? 0; bv=b.composite?.l4_vs_l52 ?? 0; }
      else if(sortBy === "revenue_l4"){ av=a.totals?.revenue_l4 ?? 0; bv=b.totals?.revenue_l4 ?? 0; }
      else if(sortBy === "units_l4"){ av=a.totals?.units_l4 ?? 0; bv=b.totals?.units_l4 ?? 0; }
      else if(sortBy === "asin"){ av=a.asin; bv=b.asin; }
      else { av=a.bucket; bv=b.bucket; }
      if(av < bv) return sortDir==="asc" ? -1 : 1;
      if(av > bv) return sortDir==="asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }, [bucketFilter, brandFilter, search, flagFilter, sortBy, sortDir]);

  useEffect(() => { setPage(0); }, [bucketFilter, brandFilter, search, flagFilter]);

  const pageRows = filtered.slice(page*ROWS_PER_PAGE, (page+1)*ROWS_PER_PAGE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / ROWS_PER_PAGE));

  // Aggregates for top summary
  const totalRev = useMemo(() => PAYLOAD.asins.reduce((a,x)=>a+(x.totals?.revenue_l4||0), 0), []);
  const riskRev = useMemo(() =>
    PAYLOAD.asins.filter(a => ["new_decline","sustained_decline","cooling_winner"].includes(a.bucket))
      .reduce((a,x)=>a+(x.totals?.revenue_l4||0), 0), []);
  const winRev = useMemo(() =>
    PAYLOAD.asins.filter(a => ["strong_winner","accelerating"].includes(a.bucket))
      .reduce((a,x)=>a+(x.totals?.revenue_l4||0), 0), []);
  const mixedCount = useMemo(() => PAYLOAD.asins.filter(a=>a.mixed_signal).length, []);

  function setSort(col){
    if(sortBy === col) setSortDir(sortDir==="asc"?"desc":"asc");
    else { setSortBy(col); setSortDir("desc"); }
  }

  const arrow = (col) => sortBy===col ? (sortDir==="asc"?" ↑":" ↓") : "";

  return (
    <div className="app">
      {/* Header */}
      <div className="hdr">
        <div className="ttl">
          <h1>Amazon Trend Analyzer</h1>
          <span className="sub">{PAYLOAD.asin_count.toLocaleString()} ASINs · baseline mode: {baselineMode}</span>
        </div>
        <div className="meta">
          <span>Generated {new Date(PAYLOAD.generated_at).toLocaleString()}</span>
        </div>
      </div>

      {/* Summary */}
      <div className="summary">
        <div className="tile">
          <div className="lbl">ASINs analysed</div>
          <div className="val">{PAYLOAD.asin_count.toLocaleString()}</div>
        </div>
        <div className="tile">
          <div className="lbl">L4W revenue</div>
          <div className="val">{fmt$(totalRev)}</div>
        </div>
        <div className="tile success">
          <div className="lbl">In growth buckets</div>
          <div className="val">{fmt$(winRev)}</div>
          <div className="delta">Strong winner + Accelerating</div>
        </div>
        <div className="tile danger">
          <div className="lbl">At-risk revenue</div>
          <div className="val">{fmt$(riskRev)}</div>
          <div className="delta">Cooling, new decline, sustained</div>
        </div>
        <div className="tile warning">
          <div className="lbl">Mixed-signal flags</div>
          <div className="val">{mixedCount}</div>
          <div className="delta">Units & revenue diverging</div>
        </div>
      </div>

      {/* Table + side panel */}
      <div className={`main ${selected ? "with-panel" : ""}`}>
        <div className="table-pane">
          {/* Bucket filter chips */}
          <div className="filters">
            <span className="lbl">Bucket</span>
            <span className={`chip ${bucketFilter==="all"?"active":""}`} onClick={()=>setBucketFilter("all")}>All <span className="cnt">{PAYLOAD.asin_count}</span></span>
            {BUCKETS.filter(b => bucketCounts[b.key]).map(b => (
              <span key={b.key} className={`chip ${bucketFilter===b.key?"active":""}`}
                    onClick={()=>setBucketFilter(b.key)}>
                {b.label} <span className="cnt">{bucketCounts[b.key]}</span>
              </span>
            ))}
          </div>
          <div className="filters">
            <span className="lbl">Brand</span>
            <select value={brandFilter} onChange={e=>setBrandFilter(e.target.value)}>
              {brands.map(b => <option key={b} value={b}>{b==="all"?"All brands":b}</option>)}
            </select>
            <span className="lbl" style={{marginLeft:12}}>Flag</span>
            <span className={`chip ${flagFilter==="all"?"active":""}`} onClick={()=>setFlagFilter("all")}>All</span>
            <span className={`chip ${flagFilter==="mixed"?"active":""}`} onClick={()=>setFlagFilter("mixed")}>🔀 Mixed signal</span>
            <span className={`chip ${flagFilter==="volatile"?"active":""}`} onClick={()=>setFlagFilter("volatile")}>📊 Volatile</span>
            <input type="text" placeholder="Search ASIN, brand, description..."
                   value={search} onChange={e=>setSearch(e.target.value)}
                   style={{marginLeft:"auto", minWidth:240}} />
          </div>

          {/* Table */}
          {filtered.length === 0 ? (
            <div className="empty">No ASINs match the current filters.</div>
          ) : (
            <>
            <table className="dt">
              <thead>
                <tr>
                  <th onClick={()=>setSort("asin")}>ASIN{arrow("asin")}</th>
                  <th>Brand</th>
                  <th>Description</th>
                  <th>Bucket</th>
                  <th>L52w trend</th>
                  <th className="num" onClick={()=>setSort("composite_l13")}>vs L13{arrow("composite_l13")}</th>
                  <th className="num">vs L26</th>
                  <th className="num" onClick={()=>setSort("composite_l52")}>vs L52{arrow("composite_l52")}</th>
                  <th className="num" onClick={()=>setSort("units_l4")}>Units L4w{arrow("units_l4")}</th>
                  <th className="num" onClick={()=>setSort("revenue_l4")}>Rev L4w{arrow("revenue_l4")}</th>
                </tr>
              </thead>
              <tbody>
                {pageRows.map(a => {
                  const sparkData = (a.weekly||[]).map(w => w.u || 0);
                  const c13 = a.composite?.l4_vs_l13, c26 = a.composite?.l4_vs_l26, c52 = a.composite?.l4_vs_l52;
                  return (
                    <tr key={a.asin} className={selected?.asin===a.asin ? "selected" : ""}
                        onClick={()=>setSelected(a)}>
                      <td className="mono">{a.asin}</td>
                      <td>{a.brand}
                        {a.mixed_signal && <span className="flag">🔀</span>}
                        {a.volatile && <span className="flag vol">📊</span>}
                      </td>
                      <td className="desc" title={a.description || ""}>{a.description || "—"}</td>
                      <td><Badge bucket={a.bucket} label={a.bucket_label} /></td>
                      <td><Spark data={sparkData} color={
                        c13 > 1.05 ? "#0f6e56" : c13 < 0.95 ? "#791f1f" : "#6b6a64"} /></td>
                      <td className={`num ${cls(c13)}`}>{fmtIdx(c13)}</td>
                      <td className={`num ${cls(c26)}`}>{fmtIdx(c26)}</td>
                      <td className={`num ${cls(c52)}`}>{fmtIdx(c52)}</td>
                      <td className="num">{fmtN(a.totals?.units_l4)}</td>
                      <td className="num">{fmt$(a.totals?.revenue_l4)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="pagination">
              <span>Showing {page*ROWS_PER_PAGE+1}–{Math.min((page+1)*ROWS_PER_PAGE, filtered.length)} of {filtered.length}</span>
              <span style={{display:"flex",gap:6}}>
                <button onClick={()=>setPage(0)} disabled={page===0}>« First</button>
                <button onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0}>‹ Prev</button>
                <span style={{padding:"4px 8px"}}>Page {page+1} of {totalPages}</span>
                <button onClick={()=>setPage(Math.min(totalPages-1,page+1))} disabled={page>=totalPages-1}>Next ›</button>
                <button onClick={()=>setPage(totalPages-1)} disabled={page>=totalPages-1}>Last »</button>
              </span>
            </div>
            </>
          )}
        </div>
        {selected && (
          <Panel asin={selected} onClose={()=>setSelected(null)}
                 baselineMode={baselineMode} setBaselineMode={setBaselineMode} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
